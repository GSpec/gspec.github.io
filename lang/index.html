<\/tr>\n    <tr>\n      <td colspan=\"3\" style=\"height: 20px\"><\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/WithdrawalCancelled":{"_display":"Templates/WithdrawalCancelled","_key":"Templates/WithdrawalCancelled","ar":{"name":"sm-ar.html","rel":"Templates/WithdrawalCancelled/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>تم إلغاء طلب السحب<\/h1>\n        <h2>يرجى التحقق من هذه التفاصيل.<\/h2>\n        <h3>مرحباً {{firstName}}،<\/h3>\n        <p style=\"margin-bottom: 30px;\">\n          تم إلغاء طلب السحب بمبلغ {{currencyCode}} {{withdrawalAmount}}.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>حساب التداول: {{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>مبلغ السحب: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">تسجيل الدخول<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          إذا لم تتعرف على هذا الطلب أو كانت لديك أي أسئلة أخرى، فيرجى <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">الاتصال بنا<\/a>.\n        <\/p>\n        <p>\n          مع أطيب التحيات،<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"cn":{"name":"sm-cn.html","rel":"Templates/WithdrawalCancelled/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>提款申請已取消<\/h1>\n        <h2>請檢查以下資訊。<\/h2>\n        <h3>您好 {{firstName}}，<\/h3>\n        <p style=\"margin-bottom: 30px;\">\n          您的提款申請金額 {{currencyCode}} {{withdrawalAmount}} 已被取消。\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>交易帳戶：{{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>提款金額：{{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">登入<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          如果您不識別此請求或有其他問題，請 <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">與我們聯繫<\/a>。\n        <\/p>\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"en":{"name":"sm-en.html","rel":"Templates/WithdrawalCancelled/sm-en.html","ext":".html","content":"﻿<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Withdrawal request cancelled<\/h1>\n      <h2>Please check these details.<\/h2>\n      <h3>Hi {{firstName}},<\/h3>\n      <p style=\"margin-bottom: 30px;\">\n        Your withdrawal request for the amount of {{currencyCode}} {{withdrawalAmount}} has been cancelled.\n      <\/p>\n\n      <p><span class=\"list-bullet-point\"><\/span><strong>Trading account: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Withdrawal amount: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n\n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Log in<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n      <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n        If you don't recognise this request or have any further questions, please <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\"\n      >contact our Customer Support team.<\/a>\n      <\/p>\n      <p>\n        Kind regards,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"es":{"name":"sm-es.html","rel":"Templates/WithdrawalCancelled/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Solicitud de retiro cancelada<\/h1>\n        <h2>Por favor, revise estos detalles.<\/h2>\n        <h3>Hola {{firstName}},<\/h3>\n        <p style=\"margin-bottom: 30px;\">\n          Su solicitud de retiro por {{currencyCode}} {{withdrawalAmount}} ha sido cancelada.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Cuenta de trading: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Monto de retiro: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Iniciar sesión<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          Si no reconoce esta solicitud o tiene alguna pregunta adicional, por favor <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">contáctenos<\/a>.\n        <\/p>\n        <p>\n          Saludos cordiales,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ms":{"name":"sm-ms.html","rel":"Templates/WithdrawalCancelled/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Permintaan pengeluaran dibatalkan<\/h1>\n        <h2>Sila periksa butiran ini.<\/h2>\n        <h3>Hai {{firstName}},<\/h3>\n        <p style=\"margin-bottom: 30px;\">\n          Permintaan pengeluaran anda sebanyak {{currencyCode}} {{withdrawalAmount}} telah dibatalkan.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Akaun dagangan: {{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Jumlah pengeluaran: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Log masuk<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          Jika anda tidak mengenali permintaan ini atau mempunyai sebarang pertanyaan lanjut, sila <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">hubungi kami<\/a>.\n        <\/p>\n        <p>\n          Salam mesra,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ru":{"name":"sm-ru.html","rel":"Templates/WithdrawalCancelled/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Запрос на снятие отменён<\/h1>\n        <h2>Пожалуйста, проверьте эти данные.<\/h2>\n        <h3>Здравствуйте, {{firstName}},<\/h3>\n        <p style=\"margin-bottom: 30px;\">\n          Ваш запрос на снятие суммы {{currencyCode}} {{withdrawalAmount}} был отменён.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Торговый счет: {{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Сумма снятия: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Вход<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          Если вы не распознаёте этот запрос или у вас есть дополнительные вопросы, пожалуйста, <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">свяжитесь с нами<\/a>.\n        <\/p>\n        <p>\n          С уважением,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"th":{"name":"sm-th.html","rel":"Templates/WithdrawalCancelled/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>คำขอถอนเงินถูกยกเลิก<\/h1>\n        <h2>โปรดตรวจสอบรายละเอียดเหล่านี้<\/h2>\n        <h3>เรียนคุณ {{firstName}},<\/h3>\n        <p style=\"margin-bottom: 30px;\">\n          คำขอถอนเงินของคุณจำนวน {{currencyCode}} {{withdrawalAmount}} ถูกยกเลิกแล้ว\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>บัญชีซื้อขาย: {{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>จำนวนถอน: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">เข้าสู่ระบบ<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          หากคุณไม่รู้จักคำขอนี้หรือมีคำถามเพิ่มเติม หากคุณไม่รู้จักคำขอนี้หรือมีคำถามเพิ่มเติม โปรด <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">ติดต่อเรา<\/a>.\n        <\/p>\n        <p>\n          ด้วยความนับถือ,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/WithdrawalCancelled/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Para çekme isteği iptal edildi<\/h1>\n        <h2>Lütfen bu detayları kontrol edin.<\/h2>\n        <h3>Merhaba {{firstName}},<\/h3>\n        <p style=\"margin-bottom: 30px;\">\n          {{currencyCode}} {{withdrawalAmount}} tutarındaki para çekme isteğiniz iptal edildi.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Ticaret hesabı: {{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Çekim tutarı: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Giriş yapın<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          Bu isteği tanımıyorsanız veya başka sorularınız varsa, lütfen <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">bizimle iletişime geçin<\/a>.\n        <\/p>\n        <p>\n          Saygılarımızla,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/WithdrawalCancelled/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Yêu cầu rút tiền đã bị hủy<\/h1>\n        <h2>Vui lòng kiểm tra các thông tin này.<\/h2>\n        <h3>Xin chào {{firstName}},<\/h3>\n        <p style=\"margin-bottom: 30px;\">\n          Yêu cầu rút tiền của bạn với số tiền {{currencyCode}} {{withdrawalAmount}} đã bị hủy.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Tài khoản giao dịch: {{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Số tiền rút: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Đăng nhập<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          Nếu bạn không nhận ra yêu cầu này hoặc có thêm câu hỏi, vui lòng <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">liên hệ với chúng tôi<\/a>.\n        <\/p>\n        <p>\n          Trân trọng,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/WithdrawalCancelled/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>取款请求已取消<\/h1>\n        <h2>请核对以下信息。<\/h2>\n        <h3>您好 {{firstName}}，<\/h3>\n        <p style=\"margin-bottom: 30px;\">\n          您的取款请求金额 {{currencyCode}} {{withdrawalAmount}} 已被取消。\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>交易账户：{{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>取款金额：{{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">登录<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          如果您无法确认此请求或有其他问题，请 <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">联系我们<\/a>。\n        <\/p>\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/WithdrawalCompleted":{"_display":"Templates/WithdrawalCompleted","_key":"Templates/WithdrawalCompleted","ar":{"name":"sm-ar.html","rel":"Templates/WithdrawalCompleted/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>تمت عملية السحب بنجاح!<\/h1>\n        <h2>سجّل الدخول للاطلاع على التفاصيل<\/h2>\n        <h3>مرحباً {{firstName}}،<\/h3>\n        <p class=\"gap-after-paragraph\">\n          تمت الموافقة على طلب السحب بمبلغ {{currencyCode}} {{withdrawalAmount}} وتم إرسال أموالك.\n        <\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>حساب التداول: {{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>مبلغ السحب: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n\n        <p class=\"gap-after-paragraph\">يمكنك العثور على معلومات الدفع لهذا السحب في سجل معاملاتك.<\/p>\n\n        <p class=\"gap-after-paragraph\">يرجى ملاحظة أنه قد يستغرق وصول أموالك ما يصل إلى 8 أيام عمل.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">تسجيل الدخول<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          إذا لم تتعرف على هذا الطلب، يرجى <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">الاتصال بنا<\/a>.\n        <\/p>\n        <p>\n          مع أطيب التحيات،<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"cn":{"name":"sm-cn.html","rel":"Templates/WithdrawalCompleted/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>您的提款已成功！<\/h1>\n        <h2>登入以查看詳情<\/h2>\n        <h3>您好 {{firstName}}，<\/h3>\n        <p class=\"gap-after-paragraph\">\n          您提出的提款請求 {{currencyCode}} {{withdrawalAmount}} 已獲批准，款項已發送。\n        <\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>交易帳戶：{{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>提款金額：{{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <p class=\"gap-after-paragraph\">您可以在交易歷史中查看此筆提款的付款信息。<\/p>\n        \n        <p class=\"gap-after-paragraph\">請注意，您收到款項可能需要最多 8 個工作日。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">登入<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          如果您不識別此申請，如果您對此交易有任何疑問，請 <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">與我們聯繫<\/a>。\n        <\/p>\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"en":{"name":"sm-en.html","rel":"Templates/WithdrawalCompleted/sm-en.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Your withdrawal was successful!<\/h1>\n      <h2>Log in for details<\/h2>\n      <h3>Hi {{firstName}},<\/h3>\n      <p class=\"gap-after-paragraph\">\n        Your withdrawal request for {{currencyCode}} {{withdrawalAmount}} has been approved and your money has been sent.\n      <\/p>\n      \n      <p><span class=\"list-bullet-point\"><\/span><strong>Trading account: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Withdrawal amount: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n      \n      <p class=\"gap-after-paragraph\">You can find the payment information for this withdrawal in your transaction history.<\/p>\n      \n      <p class=\"gap-after-paragraph\">Please note that it can take up to 8 working days for you to receive your money.<\/p>\n\n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Log in<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n        If you don’t recognise this request, please <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">contact us<\/a>.\n      <\/p>\n      <p>\n        Kind regards,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"es":{"name":"sm-es.html","rel":"Templates/WithdrawalCompleted/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>¡Su retiro fue exitoso!<\/h1>\n        <h2>Inicie sesión para detalles<\/h2>\n        <h3>Hola {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">\n          Su solicitud de retiro por {{currencyCode}} {{withdrawalAmount}} ha sido aprobada y su dinero ha sido enviado.\n        <\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>Cuenta de trading: {{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Monto de retiro: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <p class=\"gap-after-paragraph\">Puede encontrar la información de pago de este retiro en su historial de transacciones.<\/p>\n        \n        <p class=\"gap-after-paragraph\">Tenga en cuenta que puede tardar hasta 8 días hábiles en recibir su dinero.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Iniciar sesión<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          Si no reconoce esta solicitud, por favor <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">contáctenos<\/a>.\n        <\/p>\n        <p>\n          Saludos cordiales,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ms":{"name":"sm-ms.html","rel":"Templates/WithdrawalCompleted/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Pengeluaran anda berjaya!<\/h1>\n        <h2>Log masuk untuk maklumat lanjut<\/h2>\n        <h3>Hai {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">\n          Permintaan pengeluaran anda sebanyak {{currencyCode}} {{withdrawalAmount}} telah diluluskan dan wang anda telah dihantar.\n        <\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>Akaun dagangan: {{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Jumlah pengeluaran: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <p class=\"gap-after-paragraph\">Anda boleh mencari maklumat pembayaran untuk pengeluaran ini dalam sejarah transaksi anda.<\/p>\n        \n        <p class=\"gap-after-paragraph\">Sila ambil perhatian bahawa ia mungkin mengambil masa sehingga 8 hari bekerja untuk menerima wang anda.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Log masuk<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          Jika anda tidak mengenali permintaan ini, sila <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">hubungi kami<\/a>.\n        <\/p>\n        <p>\n          Salam mesra,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ru":{"name":"sm-ru.html","rel":"Templates/WithdrawalCompleted/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Ваш вывод средств прошёл успешно!<\/h1>\n        <h2>Войдите, чтобы узнать подробности<\/h2>\n        <h3>Здравствуйте, {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">\n          Ваша заявка на вывод средств на сумму {{currencyCode}} {{withdrawalAmount}} была одобрена, и деньги были отправлены.\n        <\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>Торговый счет: {{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Сумма вывода: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <p class=\"gap-after-paragraph\">Вы можете найти информацию о платеже по этому выводу в истории транзакций.<\/p>\n        \n        <p class=\"gap-after-paragraph\">Обратите внимание, что получение средств может занять до 8 рабочих дней.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Вход<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          Если вы не узнаёте этот запрос, пожалуйста, <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">свяжитесь с нами<\/a>.\n        <\/p>\n        <p>\n          С уважением,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"th":{"name":"sm-th.html","rel":"Templates/WithdrawalCompleted/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>การถอนของคุณสำเร็จแล้ว!<\/h1>\n        <h2>เข้าสู่ระบบเพื่อดูรายละเอียด<\/h2>\n        <h3>เรียนคุณ {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">\n          คำขอถอนเงินของคุณจำนวน {{currencyCode}} {{withdrawalAmount}} ได้รับการอนุมัติและเงินของคุณถูกส่งแล้ว\n        <\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>บัญชีซื้อขาย: {{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>จำนวนเงินที่ถอน: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <p class=\"gap-after-paragraph\">คุณสามารถค้นหาข้อมูลการชำระเงินสำหรับการถอนครั้งนี้ในประวัติธุรกรรมของคุณ<\/p>\n        \n        <p class=\"gap-after-paragraph\">โปรดทราบว่าอาจใช้เวลาถึง 8 วันทำการในการได้รับเงินของคุณ<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">เข้าสู่ระบบ<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          หากคุณไม่รู้จักคำขอนี้ โปรด <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">ติดต่อเรา<\/a>.\n        <\/p>\n        <p>\n          ด้วยความนับถือ,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/WithdrawalCompleted/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Çekiminiz başarıyla gerçekleşti!<\/h1>\n        <h2>Detaylar için giriş yapın<\/h2>\n        <h3>Merhaba {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">\n          {{currencyCode}} {{withdrawalAmount}} tutarındaki çekim isteğiniz onaylandı ve paranız gönderildi.\n        <\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>Ticaret hesabı: {{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Çekim tutarı: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <p class=\"gap-after-paragraph\">Bu çekim için ödeme bilgilerini işlem geçmişinizde bulabilirsiniz.<\/p>\n        \n        <p class=\"gap-after-paragraph\">Paranızı almak için 8 iş günü kadar süre alabileceğini lütfen unutmayın.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Giriş yapın<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          Bu isteği tanımıyorsanız, lütfen <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">bizimle iletişime geçin<\/a>.\n        <\/p>\n        <p>\n          Saygılarımızla,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/WithdrawalCompleted/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Rút tiền của bạn đã thành công!<\/h1>\n        <h2>Đăng nhập để xem chi tiết<\/h2>\n        <h3>Xin chào {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">\n          Yêu cầu rút tiền của bạn với số tiền {{currencyCode}} {{withdrawalAmount}} đã được chấp thuận và tiền của bạn đã được gửi.\n        <\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>Tài khoản giao dịch: {{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Số tiền rút: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <p class=\"gap-after-paragraph\">Bạn có thể tìm thông tin thanh toán cho lệnh rút này trong lịch sử giao dịch của mình.<\/p>\n        \n        <p class=\"gap-after-paragraph\">Xin lưu ý rằng bạn có thể mất đến 8 ngày làm việc để nhận được tiền.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Đăng nhập<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          Nếu bạn không nhận ra yêu cầu này, vui lòng <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">liên hệ với chúng tôi<\/a>.\n        <\/p>\n        <p>\n          Trân trọng,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/WithdrawalCompleted/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>您的提款已成功！<\/h1>\n        <h2>登录以查看详情<\/h2>\n        <h3>您好 {{firstName}}，<\/h3>\n        <p class=\"gap-after-paragraph\">\n          您的提款请求 {{currencyCode}} {{withdrawalAmount}} 已获批准，款项已发送。\n        <\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>交易账户：{{tradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>提款金额：{{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n        \n        <p class=\"gap-after-paragraph\">您可以在交易历史中找到此提款的付款信息。<\/p>\n        \n        <p class=\"gap-after-paragraph\">请注意，您收到款项可能需要最多 8 个工作日。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">登录<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          如果您不识别此请求，请 <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">联系我们<\/a>。\n        <\/p>\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/WithdrawalRejected":{"_display":"Templates/WithdrawalRejected","_key":"Templates/WithdrawalRejected","ar":{"name":"sm-ar.html","rel":"Templates/WithdrawalRejected/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>تم رفض طلب السحب<\/h1>\n      <h2>مهم - يرجى القراءة.<\/h2>\n      <h3>مرحباً {{firstName}},<\/h3>\n      <p class=\"gap-after-paragraph\">\n        تم رفض طلب السحب الخاص بك بمبلغ {{currencyCode}} {{withdrawalAmount}}.\n      <\/p>\n\n      <p><span class=\"list-bullet-point\"><\/span><strong>حساب التداول: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>مبلغ السحب: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n\n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">تسجيل الدخول<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          إذا لم تتعرف على هذا الطلب أو كانت لديك أي أسئلة أخرى، فيرجى           إذا كنت لا تتعرف على هذه المعاملة، يرجى <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">الاتصال بنا<\/a>.\n      <\/p>\n      <p>\n        مع أطيب التحيات،<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"cn":{"name":"sm-cn.html","rel":"Templates/WithdrawalRejected/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>提款请求已被拒绝<\/h1>\n      <h2>重要 - 请阅读。<\/h2>\n      <h3>嗨 {{firstName}},<\/h3>\n      <p class=\"gap-after-paragraph\">\n        您金额为 {{currencyCode}} {{withdrawalAmount}} 的提款请求已被拒绝。\n      <\/p>\n\n      <p><span class=\"list-bullet-point\"><\/span><strong>交易账户：{{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>提款金额：{{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n\n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">登录<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n          如果您不識別此請求或有其他問題，如果您對此交易有任何疑問，請 <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">與我們聯繫<\/a>。\n      <\/p>\n      <p>\n        此致，<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"en":{"name":"sm-en.html","rel":"Templates/WithdrawalRejected/sm-en.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Withdrawal request declined<\/h1>\n      <h2>Important – please read.<\/h2>\n      <h3>Hi {{firstName}},<\/h3>\n      <p class=\"gap-after-paragraph\">\n        Your withdrawal request for {{currencyCode}} {{withdrawalAmount}} has been declined.\n      <\/p>\n\n      <p><span class=\"list-bullet-point\"><\/span><strong>Trading account: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Withdrawal amount: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n\n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Log in<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n        If you don't recognise this request or have any further questions, please <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">contact us<\/a>.\n      <p>\n        Kind regards,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"es":{"name":"sm-es.html","rel":"Templates/WithdrawalRejected/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Solicitud de retiro rechazada<\/h1>\n      <h2>Importante: por favor lea.<\/h2>\n      <h3>Hola {{firstName}},<\/h3>\n      <p class=\"gap-after-paragraph\">\n        Su solicitud de retiro por {{currencyCode}} {{withdrawalAmount}} ha sido rechazada.\n      <\/p>\n\n      <p><span class=\"list-bullet-point\"><\/span><strong>Cuenta de trading: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Monto de retiro: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n\n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Iniciar sesión<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n        Si no reconoce esta solicitud o tiene alguna pregunta adicional, por favor <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">contáctenos<\/a>.\n      <\/p>\n      <p>\n        Saludos cordiales,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"ms":{"name":"sm-ms.html","rel":"Templates/WithdrawalRejected/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Permintaan pengeluaran ditolak<\/h1>\n      <h2>Penting - sila baca.<\/h2>\n      <h3>Hai {{firstName}},<\/h3>\n      <p class=\"gap-after-paragraph\">\n        Permintaan pengeluaran anda sebanyak {{currencyCode}} {{withdrawalAmount}} telah ditolak.\n      <\/p>\n\n      <p><span class=\"list-bullet-point\"><\/span><strong>Akaun dagangan: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Jumlah pengeluaran: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n\n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Log masuk<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n        Jika anda tidak mengenali permintaan ini atau mempunyai sebarang pertanyaan lanjut, sila <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">hubungi kami<\/a>.\n      <\/p>\n      <p>\n        Salam mesra,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"ru":{"name":"sm-ru.html","rel":"Templates/WithdrawalRejected/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Запрос на вывод отклонён<\/h1>\n      <h2>Важно – пожалуйста, прочтите.<\/h2>\n      <h3>Привет {{firstName}},<\/h3>\n      <p class=\"gap-after-paragraph\">\n        Ваш запрос на вывод средств на сумму {{currencyCode}} {{withdrawalAmount}} был отклонён.\n      <\/p>\n\n      <p><span class=\"list-bullet-point\"><\/span><strong>Торговый счёт: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Сумма вывода: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n\n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Войти<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n        Если вы не распознаёте этот запрос или у вас есть дополнительные вопросы, пожалуйста, <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">свяжитесь с нами<\/a>.\n      <\/p>\n      <p>\n        С уважением,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"th":{"name":"sm-th.html","rel":"Templates/WithdrawalRejected/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>คำขอถอนเงินถูกปฏิเสธ<\/h1>\n      <h2>สำคัญ - โปรดอ่าน<\/h2>\n      <h3>สวัสดี {{firstName}},<\/h3>\n      <p class=\"gap-after-paragraph\">\n        คำขอถอนเงินของคุณจำนวน {{currencyCode}} {{withdrawalAmount}} ถูกปฏิเสธแล้ว\n      <\/p>\n\n      <p><span class=\"list-bullet-point\"><\/span><strong>บัญชีซื้อขาย: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>จำนวนถอน: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n\n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">เข้าสู่ระบบ<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n        หากคุณไม่รู้จักคำขอนี้หรือมีคำถามเพิ่มเติม โปรด <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">ติดต่อเรา<\/a>.\n      <\/p>\n      <p>\n        ด้วยความนับถือ,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/WithdrawalRejected/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Para çekme talebi reddedildi<\/h1>\n      <h2>Önemli – lütfen okuyun.<\/h2>\n      <h3>Merhaba {{firstName}},<\/h3>\n      <p class=\"gap-after-paragraph\">\n        {{currencyCode}} {{withdrawalAmount}} tutarındaki para çekme talebiniz reddedildi.\n      <\/p>\n\n      <p><span class=\"list-bullet-point\"><\/span><strong>Ticaret hesabı: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Çekim tutarı: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n\n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Giriş yapın<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n        Bu isteği tanımıyorsanız veya başka sorularınız varsa, lütfen <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">bizimle iletişime geçin<\/a>.\n      <\/p>\n      <p>\n        Saygılarımızla,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/WithdrawalRejected/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Yêu cầu rút tiền bị từ chối<\/h1>\n      <h2>Quan trọng - vui lòng đọc.<\/h2>\n      <h3>Xin chào {{firstName}},<\/h3>\n      <p class=\"gap-after-paragraph\">\n        Yêu cầu rút tiền của bạn với số tiền {{currencyCode}} {{withdrawalAmount}} đã bị từ chối.\n      <\/p>\n\n      <p><span class=\"list-bullet-point\"><\/span><strong>Tài khoản giao dịch: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Số tiền rút: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n\n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Đăng nhập<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n        Nếu bạn không nhận ra yêu cầu này hoặc có thêm câu hỏi, vui lòng <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">liên hệ với chúng tôi<\/a>.\n      <\/p>\n      <p>\n        Trân trọng,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/WithdrawalRejected/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>提款请求已被拒绝<\/h1>\n      <h2>重要 - 请阅读。<\/h2>\n      <h3>嗨 {{firstName}},<\/h3>\n      <p class=\"gap-after-paragraph\">\n        您金额为 {{currencyCode}} {{withdrawalAmount}} 的提款请求已被拒绝。\n      <\/p>\n\n      <p><span class=\"list-bullet-point\"><\/span><strong>交易账户：{{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>提款金额：{{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n\n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">登录<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px; margin-bottom: 20px;\">\n        如果您无法确认此请求或有其他问题，请 <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">联系我们<\/a>。\n      <\/p>\n      <p>\n        此致，<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/WithdrawalRequested":{"_display":"Templates/WithdrawalRequested","_key":"Templates/WithdrawalRequested","ar":{"name":"sm-ar.html","rel":"Templates/WithdrawalRequested/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>تم استلام طلب السحب<\/h1>\n      <h2>يرجى التحقق من هذه التفاصيل.<\/h2>\n      <h3>مرحباً {{firstName}},<\/h3>\n      <p>تم استلام طلب السحب الخاص بك بمبلغ {{currencyCode}} {{withdrawalAmount}}.<\/p>\n      <p class=\"gap-after-paragraph\">عادةً ما يستغرق فريقنا 1-2 يوم عمل لمراجعة الطلب والموافقة عليه - وسنوافيك بالتحديثات عبر البريد الإلكتروني.<\/p>\n      \n      <p><span class=\"list-bullet-point\"><\/span><strong>حساب التداول: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>مبلغ السحب: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n      \n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">تسجيل الدخول<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px;margin-bottom: 20px;\">\n          إذا لم تتعرف على هذا الطلب أو كانت لديك أي أسئلة أخرى، فيرجى إذا لم تتعرف على هذا الطلب أو كانت لديك أي أسئلة أخرى، فيرجى           إذا كنت لا تتعرف على هذه المعاملة، يرجى <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">الاتصال بنا<\/a>.\n      <\/p>\n      <p>\n        مع أطيب التحيات،<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"cn":{"name":"sm-cn.html","rel":"Templates/WithdrawalRequested/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>已收到提款请求<\/h1>\n      <h2>请检查这些详细信息。<\/h2>\n      <h3>嗨 {{firstName}},<\/h3>\n      <p>我们已收到您金额为 {{currencyCode}} {{withdrawalAmount}} 的提款请求。<\/p>\n      <p class=\"gap-after-paragraph\">我们团队通常需要 1-2 个工作日来审核并批准请求 - 我们会通过电子邮件向您更新。<\/p>\n      \n      <p><span class=\"list-bullet-point\"><\/span><strong>交易账户：{{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>提款金额：{{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n      \n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">登录<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px;margin-bottom: 20px;\">\n          如果您不識別此請求或有其他問題，如果您對此交易有任何疑問，請 <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">與我們聯繫<\/a>。\n      <\/p>\n      <p>\n        此致，<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"en":{"name":"sm-en.html","rel":"Templates/WithdrawalRequested/sm-en.html","ext":".html","content":"﻿<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Withdrawal request received<\/h1>\n      <h2>Please check these details.<\/h2>\n      <h3>Hi {{firstName}},<\/h3>\n      <p>Your withdrawal request for {{currencyCode}} {{withdrawalAmount}} has been received.<\/p>\n      <p class=\"gap-after-paragraph\">It usually takes 1-2 working days for our team to review and approve a request - we’ll keep you updated via email.<\/p>\n      \n      <p><span class=\"list-bullet-point\"><\/span><strong>Trading account: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Withdrawal amount: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n      \n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Log in<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px;margin-bottom: 20px;\">\n        If you don't recognise this request or have any further questions, please <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">contact us<\/a>.\n      <\/p>\n      <p>\n        Kind regards,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"es":{"name":"sm-es.html","rel":"Templates/WithdrawalRequested/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Solicitud de retiro recibida<\/h1>\n      <h2>Por favor revise estos detalles.<\/h2>\n      <h3>Hola {{firstName}},<\/h3>\n      <p>Hemos recibido su solicitud de retiro por {{currencyCode}} {{withdrawalAmount}}.<\/p>\n      <p class=\"gap-after-paragraph\">Normalmente toma 1-2 días hábiles para que nuestro equipo revise y apruebe una solicitud; le mantendremos informado por correo electrónico.<\/p>\n      \n      <p><span class=\"list-bullet-point\"><\/span><strong>Cuenta de trading: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Monto de retiro: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n      \n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Iniciar sesión<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px;margin-bottom: 20px;\">\n        Si no reconoce esta solicitud o tiene alguna pregunta adicional, por favor <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">contáctenos<\/a>.\n      <\/p>\n      <p>\n        Saludos cordiales,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"ms":{"name":"sm-ms.html","rel":"Templates/WithdrawalRequested/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Permintaan pengeluaran diterima<\/h1>\n      <h2>Sila semak butiran ini.<\/h2>\n      <h3>Hai {{firstName}},<\/h3>\n      <p>Permintaan pengeluaran anda sebanyak {{currencyCode}} {{withdrawalAmount}} telah diterima.<\/p>\n      <p class=\"gap-after-paragraph\">Biasanya mengambil masa 1-2 hari bekerja untuk pasukan kami mengkaji dan meluluskan permintaan - kami akan terus mengemas kini anda melalui e-mel.<\/p>\n      \n      <p><span class=\"list-bullet-point\"><\/span><strong>Akaun dagangan: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Jumlah pengeluaran: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n      \n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Log masuk<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px;margin-bottom: 20px;\">\n        Jika anda tidak mengenali permintaan ini atau mempunyai sebarang pertanyaan lanjut, sila <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">hubungi kami<\/a>.\n      <\/p>\n      <p>\n        Salam mesra,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"ru":{"name":"sm-ru.html","rel":"Templates/WithdrawalRequested/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Запрос на вывод получен<\/h1>\n      <h2>Пожалуйста, проверьте эти данные.<\/h2>\n      <h3>Привет {{firstName}},<\/h3>\n      <p>Мы получили ваш запрос на вывод средств на сумму {{currencyCode}} {{withdrawalAmount}}.<\/p>\n      <p class=\"gap-after-paragraph\">Обычно нашей команде требуется 1-2 рабочих дня, чтобы проверить и одобрить запрос — мы будем держать вас в курсе по электронной почте.<\/p>\n      \n      <p><span class=\"list-bullet-point\"><\/span><strong>Торговый счёт: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Сумма вывода: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n      \n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Войти<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px;margin-bottom: 20px;\">\n        Если вы не распознаёте этот запрос или у вас есть дополнительные вопросы, пожалуйста, <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">свяжитесь с нами<\/a>.\n      <\/p>\n      <p>\n        С уважением,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"th":{"name":"sm-th.html","rel":"Templates/WithdrawalRequested/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>ได้รับคำขอถอนเงินแล้ว<\/h1>\n      <h2>โปรดตรวจสอบรายละเอียดเหล่านี้<\/h2>\n      <h3>สวัสดี {{firstName}},<\/h3>\n      <p>เราได้รับคำขอถอนเงินของคุณจำนวน {{currencyCode}} {{withdrawalAmount}} แล้ว<\/p>\n      <p class=\"gap-after-paragraph\">โดยปกติทีมของเราจะใช้เวลา 1-2 วันทำการในการตรวจสอบและอนุมัติคำขอ — เราจะแจ้งให้คุณทราบผ่านทางอีเมล<\/p>\n      \n      <p><span class=\"list-bullet-point\"><\/span><strong>บัญชีซื้อขาย: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>จำนวนถอน: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n      \n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">เข้าสู่ระบบ<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px;margin-bottom: 20px;\">\n        หากคุณไม่รู้จักคำขอนี้หรือมีคำถามเพิ่มเติม หากคุณไม่รู้จักคำขอนี้หรือมีคำถามเพิ่มเติม โปรด <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">ติดต่อเรา<\/a>.\n      <\/p>\n      <p>\n        ด้วยความนับถือ,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/WithdrawalRequested/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Para çekme talebi alındı<\/h1>\n      <h2>Lütfen bu bilgileri kontrol edin.<\/h2>\n      <h3>Merhaba {{firstName}},<\/h3>\n      <p>{{currencyCode}} {{withdrawalAmount}} tutarındaki para çekme talebiniz alındı.<\/p>\n      <p class=\"gap-after-paragraph\">Talebin incelenip onaylanması genellikle 1-2 iş günü sürer - sizi e-posta ile bilgilendireceğiz.<\/p>\n      \n      <p><span class=\"list-bullet-point\"><\/span><strong>Ticaret hesabı: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Çekim tutarı: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n      \n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Giriş yapın<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px;margin-bottom: 20px;\">\n        Bu isteği tanımıyorsanız veya başka sorularınız varsa, lütfen <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">bizimle iletişime geçin<\/a>.\n      <\/p>\n      <p>\n        Saygılarımızla,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/WithdrawalRequested/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Yêu cầu rút tiền đã được nhận<\/h1>\n      <h2>Vui lòng kiểm tra các thông tin này.<\/h2>\n      <h3>Xin chào {{firstName}},<\/h3>\n      <p>Chúng tôi đã nhận được yêu cầu rút tiền của bạn với số tiền {{currencyCode}} {{withdrawalAmount}}.<\/p>\n      <p class=\"gap-after-paragraph\">Thông thường đội ngũ của chúng tôi mất 1-2 ngày làm việc để xem xét và phê duyệt yêu cầu — chúng tôi sẽ cập nhật cho bạn qua email.<\/p>\n      \n      <p><span class=\"list-bullet-point\"><\/span><strong>Tài khoản giao dịch: {{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Số tiền rút: {{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n      \n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Đăng nhập<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px;margin-bottom: 20px;\">\n        Nếu bạn không nhận ra yêu cầu này hoặc có thêm câu hỏi, vui lòng <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">liên hệ với chúng tôi<\/a>.\n      <\/p>\n      <p>\n        Trân trọng,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/WithdrawalRequested/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>已收到提款请求<\/h1>\n      <h2>请检查这些详细信息。<\/h2>\n      <h3>嗨 {{firstName}},<\/h3>\n      <p>我们已收到您金额为 {{currencyCode}} {{withdrawalAmount}} 的提款请求。<\/p>\n      <p class=\"gap-after-paragraph\">我们团队通常需要 1-2 个工作日来审核并批准请求 - 我们会通过电子邮件向您更新。<\/p>\n      \n      <p><span class=\"list-bullet-point\"><\/span><strong>交易账户：{{tradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>提款金额：{{currencyCode}} {{withdrawalAmount}}<\/strong><\/p>\n      \n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">登录<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px;margin-bottom: 20px;\">\n        如果您无法确认此请求或有其他问题，请 <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">联系我们<\/a>。\n      <\/p>\n      <p>\n        此致，<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>"}}}</script>

<script>
const FILES = JSON.parse(document.getElementById('tdata').textContent);
let S = {base:null, lang:null, vEn:'raw', vOt:'raw', syncing:false};

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

(function init(){
  const bases = Object.keys(FILES);
  const lset  = new Set();
  bases.forEach(b =>
    Object.keys(FILES[b]).filter(k => !k.startsWith('_') && k !== 'en').forEach(l => lset.add(l))
  );
  const langs = [...lset].sort();

  const total   = bases.length;
  const withEn  = bases.filter(b => FILES[b]['en']).length;
  document.getElementById('stats').textContent =
    `${total} group${total!==1?'s':''} \u00b7 ${langs.length} lang${langs.length!==1?'s':''}: ${langs.join(', ')||'none'}`;

  // Language pills
  const pillsEl = document.getElementById('lang-pills');
  pillsEl.innerHTML = '<span class="pill en">en</span>' +
    langs.map(l => `<span class="pill" data-l="${l}" onclick="pickLang('${l}')">${l}</span>`).join('');
  if (langs.length) pickLang(langs[0]);

  // Sidebar grouped by parent folder
  const byParent = {};
  bases.forEach(b => {
    const key   = FILES[b]._display || b;
    const si    = key.lastIndexOf('/');
    const parent = si >= 0 ? key.slice(0, si) : '';
    const label  = si >= 0 ? key.slice(si + 1) : key;
    (byParent[parent] = byParent[parent] || []).push({key: b, label, hasEn: !!FILES[b]['en']});
  });

  const listEl  = document.getElementById('file-list');
  const parents = Object.keys(byParent).sort();
  listEl.innerHTML = parents.map(p => {
    const hdr = p ? `<div class="fldr">${esc(p)}</div>` : '';
    return hdr + byParent[p].map(it => {
      const indent = p ? 'style="padding-left:22px"' : '';
      return `<div class="fitem${it.hasEn ? '' : ' warn'}" data-k="${it.key}"
        onclick="pickBase('${it.key.replace(/'/g, "\\'")}')"
        title="${esc(it.key)}" ${indent}>${esc(it.label)}</div>`;
    }).join('');
  }).join('');

  const warnCount = bases.filter(b => !FILES[b]['en']).length;
  document.getElementById('sb-count').textContent =
    `${total} folder${total!==1?'s':''}${warnCount ? ` \u00b7 ${warnCount} missing EN` : ''}`;

  if (bases.length) pickBase(bases[0]);
})();

function pickBase(key) {
  S.base = key;
  document.querySelectorAll('.fitem').forEach(el => el.classList.toggle('on', el.dataset.k === key));
  render();
}

function pickLang(l) {
  S.lang = l;
  document.querySelectorAll('.pill[data-l]').forEach(el => el.classList.toggle('on', el.dataset.l === l));
  document.getElementById('other-badge').textContent = l.toUpperCase();
  render();
}

function setView(panel, mode) {
  if (panel === 'en') {
    S.vEn = mode;
    document.getElementById('b-en-raw').classList.toggle('on', mode === 'raw');
    document.getElementById('b-en-rend').classList.toggle('on', mode === 'rendered');
  } else {
    S.vOt = mode;
    document.getElementById('b-ot-raw').classList.toggle('on', mode === 'raw');
    document.getElementById('b-ot-rend').classList.toggle('on', mode === 'rendered');
  }
  render();
}

function fillPanel(bodyId, pathId, file, mode) {
  const body   = document.getElementById(bodyId);
  const pathEl = document.getElementById(pathId);
  if (!file) {
    pathEl.textContent = 'not found';
    body.innerHTML = '<div class="empty">File not found for this folder</div>';
    return;
  }
  pathEl.textContent = file.rel;
  body.innerHTML = mode === 'rendered'
    ? `<div class="rview">${file.content}</div>`
    : `<pre>${esc(file.content)}</pre>`;
}

function render() {
  if (!S.base) return;
  const enFile = FILES[S.base]?.['en'];
  const otFile = S.lang ? FILES[S.base]?.[S.lang] : null;

  fillPanel('body-en', 'en-path', enFile, S.vEn);

  if (!S.lang) {
    document.getElementById('other-path').textContent = '—';
    document.getElementById('body-other').innerHTML = '<div class="empty">Select a language above</div>';
  } else {
    fillPanel('body-other', 'other-path', otFile, S.vOt);
  }

  doSearch();
  setupSync();
}

function doSearch() {
  const q = document.getElementById('search').value.trim();
  highlightPre('body-en', q);
  highlightPre('body-other', q);
}

function highlightPre(bodyId, q) {
  const pre = document.getElementById(bodyId).querySelector('pre');
  if (!pre) return;
  const raw = pre.textContent;
  if (!q) { pre.innerHTML = esc(raw); return; }
  const eq = esc(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  pre.innerHTML = esc(raw).replace(new RegExp(`(${eq})`, 'gi'), '<mark>$1</mark>');
}

function setupSync() {
  const a = document.getElementById('body-en');
  const b = document.getElementById('body-other');
  a.onscroll = b.onscroll = null;
  if (!document.getElementById('sync').checked) return;
  a.onscroll = () => {
    if (S.syncing) return; S.syncing = true;
    b.scrollTop = (a.scrollTop / (a.scrollHeight - a.clientHeight || 1))
                  * (b.scrollHeight - b.clientHeight);
    S.syncing = false;
  };
  b.onscroll = () => {
    if (S.syncing) return; S.syncing = true;
    a.scrollTop = (b.scrollTop / (b.scrollHeight - b.clientHeight || 1))
                  * (a.scrollHeight - a.clientHeight);
    S.syncing = false;
  };
}
</script>
</body>
</html>
