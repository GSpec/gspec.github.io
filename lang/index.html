<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Translation Proofreading Viewer</title>
<style>
:root{
  --bg:#0e0e1a;--surface:#151525;--surface2:#1b1b2e;
  --border:#25254a;--text:#d2d2ec;--muted:#5a6090;
  --accent:#7070e0;--accent-dim:rgba(112,112,224,.15);
  --en-bg:#0b1a0b;--en-bd:#1a3a1a;--en-col:#70b870;
  --lg-bg:#0b0b22;--lg-bd:#1a1a44;--lg-col:#8080c8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column;font-family:'Segoe UI',system-ui,sans-serif;
     background:var(--bg);color:var(--text);font-size:14px}

/* header */
#hdr{display:flex;align-items:center;gap:12px;padding:9px 16px;
     background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
#hdr h1{font-size:13px;font-weight:600;color:#9090d8;letter-spacing:.02em}
#hdr .sp{flex:1}
#stats{font-size:12px;color:var(--muted)}
#built{font-size:11px;color:#30305a}

/* toolbar */
#toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:10px;
         padding:7px 14px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0}
.tb-label{font-size:12px;color:var(--muted);white-space:nowrap}
#lang-pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:3px 11px;border-radius:99px;border:1px solid var(--border);cursor:pointer;
      font-size:12px;color:var(--muted);background:transparent;user-select:none;transition:all .12s}
.pill:hover{border-color:var(--accent);color:var(--text)}
.pill.on{background:var(--accent-dim);border-color:var(--accent);color:#b0b0f0}
.pill.en{background:rgba(60,130,60,.12);border-color:var(--en-bd);color:var(--en-col);cursor:default}
.vsep{width:1px;background:var(--border);align-self:stretch}
#search{padding:4px 10px;border:1px solid var(--border);border-radius:4px;
        background:var(--surface);color:var(--text);font-size:12px;outline:none;width:190px}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--muted)}
.sync-wrap{display:flex;align-items:center;gap:5px;cursor:pointer}
.sync-wrap input{accent-color:var(--accent)}
.sync-wrap label{font-size:12px;color:var(--muted);cursor:pointer}

/* layout */
#main{display:flex;flex:1;overflow:hidden}

/* sidebar */
#sidebar{width:215px;flex-shrink:0;display:flex;flex-direction:column;
         background:var(--surface);border-right:1px solid var(--border);overflow:hidden}
#sb-hdr{padding:9px 12px 5px;font-size:10px;font-weight:700;text-transform:uppercase;
        letter-spacing:.1em;color:var(--muted);flex-shrink:0}
#sb-count{padding:0 12px 7px;font-size:11px;color:#404070;flex-shrink:0}
#file-list{flex:1;overflow-y:auto}
.fldr{padding:10px 12px 3px;font-size:10px;font-weight:700;text-transform:uppercase;
      letter-spacing:.08em;color:#363660}
.fitem{padding:7px 12px 7px 14px;font-size:12px;cursor:pointer;white-space:nowrap;
       overflow:hidden;text-overflow:ellipsis;color:#7070a0;
       border-left:2px solid transparent;transition:all .1s}
.fitem:hover{background:var(--surface2);color:var(--text)}
.fitem.on{background:var(--accent-dim);color:#c0c0f0;border-left-color:var(--accent)}
.fitem.warn{color:#b06060}
.fitem.warn::after{content:' ⚠';font-size:10px}

/* viewer */
#viewer{flex:1;display:flex;overflow:hidden;background:var(--border);gap:1px}
.panel{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.phead{display:flex;align-items:center;padding:7px 12px;flex-shrink:0;gap:8px}
.phead.en{background:var(--en-bg);border-bottom:1px solid var(--en-bd)}
.phead.lg{background:var(--lg-bg);border-bottom:1px solid var(--lg-bd)}
.badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:3px;
       text-transform:uppercase;flex-shrink:0;letter-spacing:.05em}
.badge.en{background:rgba(60,130,60,.25);color:#80c080}
.badge.lg{background:rgba(80,80,200,.25);color:#8888cc}
.fpath{font-size:11px;color:var(--muted);flex:1;overflow:hidden;
       text-overflow:ellipsis;white-space:nowrap}
.vbtns{display:flex;gap:2px;flex-shrink:0}
.vbtn{font-size:11px;padding:2px 8px;border:1px solid var(--border);border-radius:3px;
      background:transparent;color:var(--muted);cursor:pointer}
.vbtn:hover{color:var(--text)}
.vbtn.on{background:var(--accent-dim);color:var(--text);border-color:rgba(112,112,224,.4)}

.pbody{flex:1;overflow-y:auto;overflow-x:hidden}
.pbody pre{padding:14px;font-family:'Cascadia Code','Consolas','Courier New',monospace;
           font-size:12px;line-height:1.8;color:#c0c0e0;white-space:pre-wrap;word-break:break-word}
.pbody .rview{padding:1.5rem;line-height:1.8;color:var(--text)}
.pbody .rview *{max-width:100%}
.pbody .empty{display:flex;align-items:center;justify-content:center;
              height:100%;color:#35355a;font-size:13px;text-align:center;padding:2rem}

mark{background:rgba(255,220,0,.28);color:#ffe060;border-radius:2px;padding:0 1px}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#32326a;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#5050a0}
</style>
</head>
<body>

<div id="hdr">
  <h1>&#128196;&nbsp; Translation Proofreading Viewer</h1>

  <span id="stats"></span>

</div>

<div id="toolbar">
  <span class="tb-label">Language:</span>
  <div id="lang-pills"><span class="pill en">en</span></div>

      <div class="pbody" id="body-en"><div class="empty">Select a folder from the sidebar</div></div>

    <div class="panel" id="panel-other">
      <div class="phead lg">
        <span class="badge lg" id="other-badge">—</span>
        <span class="fpath" id="other-path">—</span>
        <div class="vbtns">
          <button class="vbtn on" id="b-ot-raw"  onclick="setView('other','raw')">raw</button>
          <button class="vbtn"    id="b-ot-rend" onclick="setView('other','rendered')">rendered</button>
        </div>
      </div>
      <div class="pbody" id="body-other"><div class="empty">Select a language above</div></div>
    </div>
  </div>
</div>

_blank\">เข้าสู่ระบบ<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"\n          margin-top: 30px;\n          margin-bottom: 20px;\n        \">\n          หากคุณไม่แน่ใจเกี่ยวกับธุรกรรมนี้ โปรด <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">ติดต่อเรา<\/a>.\n        <\/p>\n        <p>\n          ด้วยความนับถือ,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/DepositCompleted/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Depozitonuz başarıyla tamamlandı!<\/h1>\n        <h2>Alım satım yapmak için giriş yapın<\/h2>\n        <h3>Merhaba {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">\n          {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}} tutarındaki depozitonuz {{accountName}} hesabınıza başarıyla eklenmiştir.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Ticaret hesabı: {{tradingAccountId}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>Para yatırma tutarı: {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}}<\/strong><\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>Ödeme tutarı: {{paymentCurrencyCode}} {{paymentAmount}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Ödeme yöntemi: {{paymentMethodFriendlyName}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>Ödeme kimliği: {{depositId}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Giriş yapın<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"\n          margin-top: 30px;\n          margin-bottom: 20px;\n        \">\n          Bu işlemi tanımıyorsanız, lütfen <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">bizimle iletişime geçin<\/a>.\n        <\/p>\n        <p>\n          Saygılarımızla,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/DepositCompleted/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Khoản tiền gửi của bạn đã được xử lý thành công!<\/h1>\n        <h2>Đăng nhập để bắt đầu giao dịch.<\/h2>\n        <h3>Xin chào {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">\n          Khoản tiền gửi của bạn trị giá {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}} đã được thêm thành công vào tài khoản {{accountName}} của bạn.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Tài khoản giao dịch: {{tradingAccountId}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>Số tiền gửi: {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}}<\/strong><\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>Số tiền thanh toán: {{paymentCurrencyCode}} {{paymentAmount}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Phương thức thanh toán: {{paymentMethodFriendlyName}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>ID thanh toán: {{depositId}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Đăng nhập<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"\n          margin-top: 30px;\n          margin-bottom: 20px;\n        \">\n          Nếu bạn không nhận ra giao dịch này, vui lòng <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">liên hệ với chúng tôi<\/a>.\n        <\/p>\n        <p>\n          Trân trọng,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/DepositCompleted/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>您的存款已成功！<\/h1>\n        <h2>登录以开始交易。<\/h2>\n        <h3>您好 {{firstName}}，<\/h3>\n        <p class=\"gap-after-paragraph\">\n          您的存款 {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}} 已成功存入您的 {{accountName}} 账户。\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>交易账户：{{tradingAccountId}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>存款金额：{{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}}<\/strong><\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>付款金额：{{paymentCurrencyCode}} {{paymentAmount}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>付款方式：{{paymentMethodFriendlyName}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>付款 ID：{{depositId}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">登录<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"\n          margin-top: 30px;\n          margin-bottom: 20px;\n        \">\n          如果您对此交易有任何疑问，请 <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">联系我们><\/a>.\n        <\/p>\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/DepositFailed":{"_display":"Templates/DepositFailed","_key":"Templates/DepositFailed","ar":{"name":"sm-ar.html","rel":"Templates/DepositFailed/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>إيداعك غير ناجح<\/h1>\n        <h2>مهم - يرجى القراءة.<\/h2>\n        <h3>مرحباً {{firstName}}،<\/h3>\n        <p class=\"gap-after-paragraph\">\n          لم تتم عملية إيداع {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}} بنجاح.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>حساب التداول: {{tradingAccountId}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>طريقة الدفع: {{paymentMethodFriendlyName}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>مُعرّف الدفع: {{depositId}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">تسجيل الدخول<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px;\">\n          إذا فشلت عملية الدفع، فقد يكون من المفيد تجربة طريقة دفع بديلة - نحن نقدم مجموعة من الحلول الآمنة والفعالة.\n        <\/p>\n        <p style=\"margin-bottom: 20px;\">\n          إذا كنت لا تتعرف على هذه المعاملة، يرجى <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">الاتصال بنا<\/a>.\n        <\/p>\n        <p>\n          مع أطيب التحيات،<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"cn":{"name":"sm-cn.html","rel":"Templates/DepositFailed/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>您的存款未成功<\/h1>\n        <h2>重要 - 請閱讀。<\/h2>\n        <h3>您好 {{firstName}}，<\/h3>\n        <p class=\"gap-after-paragraph\">\n          您的 {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}} 存款請求失敗。\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>交易帳戶：{{tradingAccountId}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>付款方式：{{paymentMethodFriendlyName}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>付款 ID：{{depositId}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">登入<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px;\">\n          如果您的付款失敗，不妨嘗試其他付款方式—我們提供一系列安全且有效率的解決方案。\n        <\/p>\n        <p style=\"margin-bottom: 20px;\">\n          如果您對此交易有任何疑問，請 <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">聯絡我們<\/a>.\n        <\/p>\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"en":{"name":"sm-en.html","rel":"Templates/DepositFailed/sm-en.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Your deposit was unsuccessful<\/h1>\n        <h2>Important - please read.<\/h2>\n        <h3>Hi {{firstName}},<\/h3>\n        <p style=\"margin-bottom: 30px;\">\n          Your deposit request of {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}} was unsuccessful.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Trading account: {{tradingAccountId}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Payment method: {{paymentMethodFriendlyName}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>Payment ID: {{depositId}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Log in<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px;\">\n          If your payment failed, it may be worth trying an alternative payment method - we offer a range of secure, efficient solutions.\n        <\/p>\n        <p style=\"margin-bottom: 20px;\">\n          If you don't recognise this transaction, please <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">contact us<\/a>.\n        <\/p>\n        <p>\n          Kind regards,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"es":{"name":"sm-es.html","rel":"Templates/DepositFailed/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Su Depósito No Fue Exitoso<\/h1>\n        <h2>Importante - Por Favor Lea.<\/h2>\n        <h3>Hola {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">\n          Su solicitud de depósito de {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}} no se ha completado con éxito.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Cuenta de trading: {{tradingAccountId}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Método de pago: {{paymentMethodFriendlyName}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>ID del pago: {{depositId}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Iniciar sesión<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px;\">\n          Si su pago falló, puede ser conveniente intentar con un método de pago alternativo; ofrecemos una gama de soluciones seguras y eficientes.\n        <\/p>\n        <p style=\"margin-bottom: 20px;\">\n          Si no reconoce esta transacción, por favor <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">contáctenos<\/a>.\n        <\/p>\n        <p>\n          Saludos cordiales,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ms":{"name":"sm-ms.html","rel":"Templates/DepositFailed/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Deposit Anda Tidak Berjaya<\/h1>\n        <h2>Penting - Sila Baca.<\/h2>\n        <h3>Hai {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">\n          Permintaan deposit anda sebanyak {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}} tidak berjaya.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Akaun dagangan: {{tradingAccountId}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>KAmet pembayaran: {{paymentMethodFriendlyName}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>ID pembayaran: {{depositId}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Log masuk<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px;\">\n          Jika pembayaran anda gagal, anda mungkin ingin mencuba kaedah pembayaran lain – kami menawarkan pelbagai penyelesaian yang selamat dan efisien.\n        <\/p>\n        <p style=\"margin-bottom: 20px;\">\n          Jika anda tidak mengenali transaksi ini, sila <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">hubungi kami<\/a>.\n        <\/p>\n        <p>\n          Salam mesra,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ru":{"name":"sm-ru.html","rel":"Templates/DepositFailed/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Ваш депозит не был успешным<\/h1>\n        <h2>Важная информация - пожалуйста, прочтите.<\/h2>\n        <h3>Здравствуйте, {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">\n          Ваш запрос на пополнение счета на сумму {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}} не удался.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Торговый счет: {{tradingAccountId}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Способ оплаты: {{paymentMethodFriendlyName}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>ID платежа: {{depositId}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Вход<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px;\">\n          Если ваш платеж не удался, возможно, стоит попробовать другой способ оплаты — мы предлагаем ряд безопасных и эффективных решений.\n        <\/p>\n        <p style=\"margin-bottom: 20px;\">\n          Если вы не узнаете эту транзакцию, пожалуйста <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">свяжитесь с нами<\/a>.\n        <\/p>\n        <p>\n          С уважением,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"th":{"name":"sm-th.html","rel":"Templates/DepositFailed/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>การฝากของคุณไม่สำเร็จ<\/h1>\n        <h2>สำคัญ - กรุณาอ่าน<\/h2>\n        <h3>เรียนคุณ {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">\n          คำขอการฝากเงินของคุณจำนวน {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}} ไม่สำเร็จ\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>บัญชีซื้อขาย: {{tradingAccountId}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>วิธีการชำระเงิน: {{paymentMethodFriendlyName}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>รหัสการชำระเงิน: {{depositId}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">เข้าสู่ระบบ<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px;\">\n          หากการชำระเงินของคุณล้มเหลว โปรดลองใช้วิธีการชำระประเภทอื่น - ทางเรามีวิธีการชำระเงินที่ปลอดภัยและมีประสิทธิภาพหลากหลายวิธี\n        <\/p>\n        <p style=\"margin-bottom: 20px;\">\n          หากคุณไม่แน่ใจเกี่ยวกับธุรกรรมนี้ โปรด <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">ติดต่อเรา<\/a>.\n        <\/p>\n        <p>\n          ด้วยความนับถือ,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/DepositFailed/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Para yatırma işleminiz başarısız oldu<\/h1>\n        <h2>Önemli - lütfen okuyun.<\/h2>\n        <h3>Merhaba {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">\n          {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}} tutarındaki para yatırma talebiniz başarısız oldu.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Ticaret hesabı: {{tradingAccountId}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Ödeme yöntemi: {{paymentMethodFriendlyName}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>Ödeme kimliği: {{depositId}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Giriş yapın<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px;\">\n          Ödemeniz başarısız olduysa, alternatif bir ödeme yöntemi denemeniz faydalı olabilir. Güvenli ve verimli bir dizi çözüm sunuyoruz.\n        <\/p>\n        <p style=\"margin-bottom: 20px;\">\n          Bu işlemi tanımıyorsanız, lütfen <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">bizimle iletişime geçin<\/a>.\n        <\/p>\n        <p>\n          Saygılarımızla,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/DepositFailed/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Tiền gửi của bạn không thành công<\/h1>\n        <h2>Quan trọng - Vui lòng đọc.<\/h2>\n        <h3>Xin chào {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">\n          Yêu cầu nạp tiền của bạn với số tiền {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}} đã không thành công.\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Tài khoản giao dịch: {{tradingAccountId}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>Phương thức thanh toán: {{paymentMethodFriendlyName}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>ID thanh toán: {{depositId}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Đăng nhập<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px;\">\n          Nếu thanh toán của bạn thất bại, bạn có thể thử phương thức thanh toán khác - chúng tôi cung cấp nhiều giải pháp an toàn và hiệu quả.\n        <\/p>\n        <p style=\"margin-bottom: 20px;\">\n          Nếu bạn không nhận ra giao dịch này, vui lòng <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">liên hệ với chúng tôi<\/a>.\n        <\/p>\n        <p>\n          Trân trọng,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/DepositFailed/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>您的存款未成功<\/h1>\n        <h2>重要 - 请阅读。<\/h2>\n        <h3>您好 {{firstName}}，<\/h3>\n        <p class=\"gap-after-paragraph\">\n          您的 {{tradingAccountCurrencyCode}} {{depositAmountInTradingAccountCurrency}} 存款请求失败。\n        <\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>交易账户：{{tradingAccountId}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point\"><\/span><strong>付款方式：{{paymentMethodFriendlyName}}<\/strong><\/p>\n        <p><span class=\"list-bullet-point gap-after-paragraph\"><\/span><strong>付款 ID：{{depositId}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">登录<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"margin-top: 30px;\">\n          如果您的支付失败，不妨尝试其他支付方式——我们提供一系列安全高效的解决方案。\n        <\/p>\n        <p style=\"margin-bottom: 20px;\">\n          如果您对此交易有任何疑问，请 <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">联系我们><\/a>.\n        <\/p>\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/ForgotPassword":{"_display":"Templates/ForgotPassword","_key":"Templates/ForgotPassword","ar":{"name":"sm-ar.html","rel":"Templates/ForgotPassword/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>نسيت كلمة السر؟<\/h1>\n        <p>لقد قمت مؤخرًا بطلب إعادة تعيين كلمة المرور الخاصة بحسابك في Scope Markets.<\/p>\n\n        <p>يرجى إدخال هذا الرمز على شاشة إعادة تعيين كلمة المرور. سيكون هذا الرمز صالحًا لمدة 60 دقيقة.<\/p>\n        <h3>{{recoveryCode}}<\/h3>\n\n        <p>يرجى ملاحظة أن تفاصيل تسجيل الدخول هي لحساب العميل الخاص بك وليس لحساب التداول.<\/p>\n\n        <p>إذا كنت بحاجة إلى دعم، فنحن هنا للمساعدة!<\/p>\n\n        <p>\n          مع فائق تحياتنا, <br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n"},"cn":{"name":"sm-cn.html","rel":"Templates/ForgotPassword/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>忘記密碼了嗎？<\/h1>\n        <p>您申請重置 Scope Markets 帳戶的密碼。<\/p>\n\n        <p>請在密碼重置頁面輸入以下驗證碼。此驗證碼有效期為 60 分鐘。<\/p>\n        <h3>{{recoveryCode}}<\/h3>\n\n        <p>請注意，登錄信息適用於您的客戶帳戶，而非您的交易帳戶。<\/p>\n\n        <p>如果您需要協助，我們隨時準備為您提供協助！<\/p>\n\n        <p>\n          順頌商祺， <br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n"},"en":{"name":"sm-en.html","rel":"Templates/ForgotPassword/sm-en.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Forgot your password?<\/h1>\n        <p>You recently requested to reset your password for your Scope Markets account.<\/p>\n\n        <p>Please enter this code on the password reset screen. This code will be valid for 60 minutes.<\/p>\n        <h3>{{recoveryCode}}<\/h3>\n\n        <p>Please note that the login details are for your customer account and NOT for your trading account.<\/p>\n\n        <p>If you need a hand, we're here to help!<\/p>\n\n        <p>\n          Kind regards,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"es":{"name":"sm-es.html","rel":"Templates/ForgotPassword/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>¿Ha olvidado su contraseña?<\/h1>\n        <p>Recientemente solicitó restablecer su contraseña para su cuenta de Scope Markets.<\/p>\n\n        <p>Ingrese este código en la pantalla de restablecimiento de contraseña. Este código será válido durante 60 minutos.<\/p>\n        <h3>{{recoveryCode}}<\/h3>\n\n        <p>Tenga en cuenta que los datos de inicio de sesión son para su cuenta de cliente y NO para su cuenta de trading.<\/p>\n\n        <p>Si necesita ayuda, ¡estamos aquí para ayudarle!<\/p>\n\n        <p>\n          Saludos cordiales,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n"},"ms":{"name":"sm-ms.html","rel":"Templates/ForgotPassword/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Lupa kata laluan anda?<\/h1>\n        <p>Anda baru-baru ini meminta untuk menetapkan semula kata laluan untuk akaun Scope Markets anda <\/p>\n\n        <p>Sila masukkan kod ini pada skrin tetapan semula kata laluan. Kod ini akan sah selama 60 minit.<\/p>\n        <h3>{{recoveryCode}}<\/h3>\n\n        <p>Sila ambil perhatian bahawa butiran log masuk adalah untuk akaun pelanggan anda dan BUKAN untuk akaun dagangan anda.<\/p>\n\n        <p>Jika anda memerlukan sokongan, kami sedia membantu!<\/p>\n\n        <p>\n          Salam mesra,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n"},"ru":{"name":"sm-ru.html","rel":"Templates/ForgotPassword/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Забыли пароль?<\/h1>\n        <p>Вы недавно запросили сброс пароля для своей учетной записи Scope Markets.<\/p>\n\n        <p>Пожалуйста, введите следующий код на экране сброса пароля. Код действителен в течение 60 минут:<\/p>\n        <h3>{{recoveryCode}}<\/h3>\n\n        <p>Обратите внимание, что данные для входа относятся к вашей клиентской учетной записи, а не к торговому счету.<\/p>\n\n        <p>Если вам нужна поддержка, мы здесь, чтобы помочь!<\/p>\n\n        <p>\n          С уважением,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n"},"th":{"name":"sm-th.html","rel":"Templates/ForgotPassword/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>ลืมรหัสผ่านใช่ไหม?<\/h1>\n        <p>คุณได้ส่งคำขอรีเซ็ตรหัสผ่านสำหรับบัญชี Scope Markets ของคุณ<\/p>\n\n        <p>กรุณากรอกรหัสนี้บนหน้าจอรีเซ็ตรหัสผ่าน รหัสนี้จะมีอายุ 60 นาที<\/p>\n        <h3>{{recoveryCode}}<\/h3>\n\n        <p>โปรดทราบว่ารายละเอียดการเข้าสู่ระบบมีไว้สำหรับบัญชีลูกค้าของคุณ ไม่ใช่สำหรับบัญชีซื้อขายของคุณ<\/p>\n\n        <p>หากคุณต้องการความช่วยเหลือ เราพร้อมให้ความช่วยเหลือคุณ!<\/p>\n\n        <p>\n          ขอแสดงความนับถือ<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n"},"tr":{"name":"sm-tr.html","rel":"Templates/ForgotPassword/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Şifrenizi mi unuttunuz?<\/h1>\n        <p>Kısa süre önce Scope Markets hesabınız için şifrenizi sıfırlama talebinde bulundunuz.<\/p>\n\n        <p>Lütfen şifre sıfırlama ekranına bu kodu girin. Bu kod 60 dakika boyunca geçerli olacaktır.<\/p>\n        <h3>{{recoveryCode}}<\/h3>\n\n        <p>Lütfen giriş bilgilerinin müşteri hesabınız için olduğunu ve işlem hesabınız için OLMADIĞINI unutmayın.<\/p>\n\n        <p>Desteğe ihtiyacınız varsa, size yardımcı olmak için buradayız!<\/p>\n\n        <p>\n          Saygılarımla,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n"},"vn":{"name":"sm-vn.html","rel":"Templates/ForgotPassword/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Bạn quên mật khẩu?<\/h1>\n        <p>Gần đây, bạn đã yêu cầu đặt lại mật khẩu cho tài khoản Scope Markets của mình.<\/p>\n\n        <p>Vui lòng nhập mã này vào màn hình đặt lại mật khẩu. Mã này sẽ có hiệu lực trong 60 phút.<\/p>\n        <h3>{{recoveryCode}}<\/h3>\n\n        <p>Xin lưu ý rằng thông tin đăng nhập dành cho tài khoản khách hàng của bạn chứ KHÔNG dành cho tài khoản giao dịch của bạn.<\/p>\n\n        <p>Nếu bạn cần hỗ trợ, chúng tôi luôn sẵn sàng giúp đỡ!<\/p>\n\n        <p>\n          Trân trọng,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n"},"zh":{"name":"sm-zh.html","rel":"Templates/ForgotPassword/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>忘记密码了吗？<\/h1>\n        <p>您申请重置 Scope Markets 账户的密码。<\/p>\n\n        <p>请在密码重置页面输入以下验证码。此验证码有效期为 60 分钟。<\/p>\n        <h3>{{recoveryCode}}<\/h3>\n\n        <p>请注意，登录信息适用于您的客户账户，而非您的交易账户。<\/p>\n\n        <p>如果您需要帮助，我们随时为您提供协助！<\/p>\n\n        <p>\n          顺颂商祺， <br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n"}},"Templates/ReadyToTrade":{"_display":"Templates/ReadyToTrade","_key":"Templates/ReadyToTrade","ar":{"name":"sm-ar.html","rel":"Templates/ReadyToTrade/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>حسابك<br />تم التحقق منه<\/h1>\n        <h2>هل أنت مستعد للتداول؟<\/h2>\n        <h3>مرحباً {{firstName}}،<\/h3>\n        <p>أخبار رائعة! تم التحقق من ملفك الشخصي في Scope Markets وتم تفعيل حساب التداول الخاص بك.<\/p>\n        <p class=\"gap-after-paragraph\">يمكنك الآن القيام بالإيداع وبدء التداول.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">قم بالإيداع الآن<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>تفاصيل حساب التداول {{platform}} الخاص بك<\/p>\n        <p>رقم الحساب: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">اسم الخادم: {{serverName}}<\/p>\n        \n        <p>للعثور على كلمة مرور {{platform}} الخاصة بك:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">قم بتسجيل الدخول إلى حساب Scope Markets الخاص بك باستخدام البريد الإلكتروني وكلمة المرور التي استخدمتها للتسجيل<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">انتقل إلى علامة التبويب ”الصفحة الرئيسية“<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">اضغط على ”تفاصيل تسجيل الدخول“ بجوار رقم حساب التداول الخاص بك<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>هل أنت مستعد للتداول؟ يمكنك الوصول إلى {{platform}} من خلال المتصفح الخاص بك، أو تنزيل التطبيق على الجوال أو الكمبيوتر.<\/p>\n\n        <p>إذا كنت بحاجة إلى المساعدة، فنحن هنا لمساعدتك!<\/p>\n\n        <p>\n          مع أطيب التحيات،<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"cn":{"name":"sm-cn.html","rel":"Templates/ReadyToTrade/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>您的帳戶<br />已驗證<\/h1>\n        <h2>準備開始交易了嗎？<\/h2>\n        <h3>您好 {{firstName}}，<\/h3>\n        <p>好消息！您的 Scope Markets 個人資料已通過驗證，交易帳號已啟用。<\/p>\n        <p class=\"gap-after-paragraph\">現在您可以進行充值並開始交易。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">立即儲值<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>您的 {{platform}} 交易帳戶詳情<\/p>\n        <p>登入名稱：{{login}}<\/p>\n        <p class=\"gap-after-paragraph\">伺服器名稱：{{serverName}}<\/p>\n        \n        <p>尋找您的 {{platform}} 密碼：/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">使用您註冊時使用的郵箱和密碼登入您的 Scope Markets 帳戶<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">前往「首頁」標籤<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">點擊您交易帳號旁的“登入詳情”<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>準備好交易了嗎？您可以透過網頁瀏覽器存取 {{platform}}，或下載手機或電腦應用程式。<\/p>\n\n        <p>如果您需要任何協助，我們隨時為您服務！<\/p>\n\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"en":{"name":"sm-en.html","rel":"Templates/ReadyToTrade/sm-en.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Your account<br />is verified<\/h1>\n        <h2>Ready to trade?<\/h2>\n        <h3>Hi {{firstName}},<\/h3>\n        <p>Great news! Your Scope Markets profile has been verified and your trading account has been activated.<\/p>\n        <p class=\"gap-after-paragraph\">You can now make a deposit and start trading.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Deposit now<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Your {{platform}} trading account details<\/p>\n        <p>Login: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">Server name: {{serverName}}<\/p>\n        \n        <p>To find your {{platform}} password:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Log in to your Scope Markets account with the email and password you used to register<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Go to the 'Home' tab<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Click 'Login Details' next to your trading account number<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>Ready to trade? You can access {{platform}} through your web browser, or download the app for mobile or desktop.<\/p>\n\n        <p>If you need a hand, we're here to help!<\/p>\n\n        <p>\n          Kind regards,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"es":{"name":"sm-es.html","rel":"Templates/ReadyToTrade/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Su cuenta<br />ha sido verificada<\/h1>\n        <h2>¿Listo para operar?<\/h2>\n        <h3>Hola {{firstName}},<\/h3>\n        <p>¡Buenas noticias! Su perfil de Scope Markets ha sido verificado y su cuenta de trading ha sido activada.<\/p>\n        <p class=\"gap-after-paragraph\">Ahora puede hacer un depósito y comenzar a operar.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Depositar ahora<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Detalles de su cuenta de trading {{platform}}<\/p>\n        <p>Usuario: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">Nombre del servidor: {{serverName}}<\/p>\n\n        <p>Para encontrar su contraseña en {{platform}}:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Inicie sesión en su cuenta de Scope Markets con el correo electrónico y la contraseña que utilizó para registrarse<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Vaya a la pestaña 'Inicio'<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Haga clic en 'Detalles de inicio de sesión' junto al número de su cuenta de trading<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>¿Listo para operar? Puede acceder a {{platform}} a través de su navegador web o descargar la aplicación para móvil o escritorio.<\/p>\n\n        <p>Si necesita ayuda, ¡estamos aquí para ayudarle!<\/p>\n\n        <p>\n          Saludos cordiales,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ms":{"name":"sm-ms.html","rel":"Templates/ReadyToTrade/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Akaun anda<br />telah disahkan<\/h1>\n        <h2>Bersedia untuk berdagang?<\/h2>\n        <h3>Hai {{firstName}},<\/h3>\n        <p>Berita baik! Profil Scope Markets anda telah disahkan dan akaun dagangan anda telah diaktifkan.<\/p>\n        <p class=\"gap-after-paragraph\">Anda kini boleh membuat deposit dan mula berdagang.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Deposit sekarang<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Maklumat akaun dagangan {{platform}} anda/p>\n        <p>Login: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">Nama server: {{serverName}}<\/p>\n        \n        <p>Cara mendapatkan kata laluan {{platform}} anda:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Log masuk ke akaun Scope Markets anda menggunakan emel dan kata laluan yang anda gunakan semasa mendaftar<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Pergi ke tab 'Home'<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Klik 'Login details' di sebelah nombor akaun dagangan anda<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>Sedia untuk berdagang? Anda boleh mengakses {{platform}} melalui pelayar web, atau muat turun aplikasi untuk mudah alih atau desktop.<\/p>\n\n        <p>Jika anda memerlukan bantuan, kami sedia membantu!<\/p>\n\n        <p>\n          Salam mesra,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ru":{"name":"sm-ru.html","rel":"Templates/ReadyToTrade/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Ваш аккаунт<br />подтвержден<\/h1>\n        <h2>Готовы к торговле?<\/h2>\n        <h3>Привет, {{firstName}},<\/h3>\n        <p>Отличные новости! Ваш профиль в Scope Markets подтвержден, и ваш торговый счет активирован.<\/p>\n        <p class=\"gap-after-paragraph\">Теперь вы можете внести депозит и начать торговлю.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Внести депозит сейчас<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Данные вашего торгового счета {{platform}}<\/p>\n        <p>Вход: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">Имя сервера: {{serverName}}<\/p>\n        \n        <p>Чтобы узнать свой пароль от {{platform}}:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Войдите в свой аккаунт Scope Markets, используя адрес электронной почты и пароль, которые вы использовали при регистрации<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Перейдите на вкладку «Главная»<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Нажмите «Данные для входа» рядом с номером вашего торгового счета<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>Готовы к торговле? Вы можете получить доступ к {{platform}} через веб-браузер или загрузить приложение для мобильных устройств или компьютеров.<\/p>\n\n        <p>Если вам нужна помощь, мы здесь, чтобы помочь!<\/p>\n\n        <p>\n          С уважением,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"th":{"name":"sm-th.html","rel":"Templates/ReadyToTrade/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>บัญชีของคุณ<br />ได้รับการยืนยัน<\/h1>\n        <h2>พร้อมที่จะซื้อขายแล้วหรือยัง?<\/h2>\n        <h3>เรียนคุณ {{firstName}},<\/h3>\n        <p>ขอแสดงความยินดี! บัญชี Scope Markets ของคุณได้รับการยืนยันแล้ว และบัญชีซื้อขายของคุณได้รับการเปิดใช้งานแล้ว<\/p>\n        <p class=\"gap-after-paragraph\">ตอนนี้คุณสามารถฝากเงินและเริ่มซื้อขายได้เลย<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">ฝากเงินตอนนี้<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>รายละเอียดบัญชีซื้อขาย {{platform}} ของคุณ<\/p>\n        <p>เข้าสู่ระบบ: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">ชื่อเซิร์ฟเวอร์: {{serverName}}<\/p>\n        \n        <p>วิธีค้นหารหัสผ่าน {{platform}} ของคุณ:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">เข้าสู่ระบบบัญชี Scope Markets ของคุณด้วยอีเมลและรหัสผ่านที่คุณใช้ลงทะเบียน<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">ไปที่แท็บ 'หน้าหลัก'<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">คลิก 'รายละเอียดการเข้าสู่ระบบ' ถัดจากหมายเลขบัญชีซื้อขายของคุณ<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>พร้อมที่จะซื้อขายแล้วหรือยัง? คุณสามารถเข้าถึง {{platform}} ผ่านเว็บเบราว์เซอร์ของคุณ หรือดาวน์โหลดแอปสำหรับมือถือหรือเดสก์ท็อป<\/p>\n\n        <p>หากคุณต้องการความช่วยเหลือใดๆ เราพร้อมบริการคุณ!<\/p>\n\n        <p>\n          ด้วยความนับถือ,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/ReadyToTrade/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>hesabınız<br />doğrulandı<\/h1>\n        <h2>Alım satıma başlamak için hazır mısınız?<\/h2>\n        <h3>Merhaba {{firstName}},<\/h3>\n        <p>Harika haberler var! Scope Markets profiliniz doğrulandı ve islem hesabınız etkinleştirildi.<\/p>\n        <p class=\"gap-after-paragraph\">Artık para yatırabilir ve isleme başlayabilirsiniz.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Şimdi para yatırın<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>{{platform}} islem hesabı bilgileriniz<\/p>\n        <p>Giriş: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">Sunucu adı: {{serverName}}<\/p>\n        \n        <p>{{platform}} şifrenizi bulmak için:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Kayıt olurken kullandığınız e-posta adresi ve şifre ile Scope Markets hesabınıza giriş yapın<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">“Ana Sayfa” sekmesine gidin<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Ticaret hesap numaranızın yanındaki “Giriş bilgileri”ni tıklayın<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>Ticarete hazır mısınız? {{platform}}'a web tarayıcınız üzerinden erişebilir veya mobil veya masaüstü için uygulamayı indirebilirsiniz.<\/p>\n\n        <p>Yardıma ihtiyacınız olursa, biz buradayız!<\/p>\n\n        <p>\n          Saygılarımızla,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/ReadyToTrade/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Tài khoản của bạn đã được xác minh<\/h1>\n        <h2>Sẵn sàng để giao dịch?<\/h2>\n        <h3>Chào {{firstName}},<\/h3>\n        <p>Tin vui! Hồ sơ Scope Markets của bạn đã được xác minh và tài khoản giao dịch của bạn đã được kích hoạt.<\/p>\n        <p class=\"gap-after-paragraph\">Bây giờ bạn có thể nạp tiền và bắt đầu giao dịch.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Nạp tiền ngay<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Chi tiết tài khoản giao dịch {{platform}} của bạn<\/p>\n        <p>Đăng nhập: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">Tên máy chủ: {{serverName}}<\/p>\n        \n        <p>Để tìm mật khẩu {{platform}} của bạn:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Đăng nhập vào tài khoản Scope Markets của bạn bằng email và mật khẩu bạn đã dùng để đăng ký<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Vào tab 'Trang chủ'<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Nhấn vào 'Chi tiết đăng nhập' bên cạnh số tài khoản giao dịch của bạn<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>Sẵn sàng để giao dịch? Bạn có thể truy cập {{platform}} qua trình duyệt web, hoặc tải ứng dụng cho thiết bị di động hoặc máy tính để bàn.<\/p>\n\n        <p>Nếu bạn cần hỗ trợ, chúng tôi luôn sẵn sàng giúp đỡ!<\/p>\n\n        <p>\n          Trân trọng,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/ReadyToTrade/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>您的账户<br />已通过验证<\/h1>\n        <h2>准备开始交易了吗？<\/h2>\n        <h3>您好 {{firstName}}，<\/h3>\n        <p>好消息！您的 Scope Markets 个人资料已通过验证，交易账户已激活。<\/p>\n        <p class=\"gap-after-paragraph\">您现在可以进行充值并开始交易。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">立即充值<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>您的 {{platform}} 交易账户详情<\/p>\n        <p>登录名：{{login}}<\/p>\n        <p class=\"gap-after-paragraph\">服务器名称：{{serverName}}<\/p>\n        \n        <p>查找您的 {{platform}} 密码：<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">使用您注册时使用的邮箱和密码登录您的 Scope Markets 账户<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">前往“首页”选项卡<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">点击您交易账户号码旁边的“登录详情”<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>准备好交易了吗？您可以通过网页浏览器访问 {{platform}}，或下载手机或电脑应用程序。<\/p>\n\n        <p>如果您需要任何帮助，我们随时为您服务！<\/p>\n\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/ReverifyAddressAccessLimited":{"_display":"Templates/ReverifyAddressAccessLimited","_key":"Templates/ReverifyAddressAccessLimited","ar":{"name":"sm-ar.html","rel":"Templates/ReverifyAddressAccessLimited/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>تقييد الدخول إلى الحساب<\/h1>\n        <p>مرحباً {{firstName}}،<\/p>\n\n        <p>تم تقييد الوصول إلى حساباتك التجارية لأن عنوانك لم يتم التحقق منه قبل الموعد النهائي.<\/p>\n        \n        <p>قم بالتحقق من عنوانك الآن وإلا فقد يتم إغلاق حسابك في Scope Markets.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">توثيق العنوان:<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>من السهل توثيق العنوان بنفسك - ما عليك سوى تسجيل الدخول إلى حساب Scope Markets الخاص بك واتباع التعليمات.<\/p>\n\n        <p>للمزيد من المساعدة، يرجى الاتصال بفريق الدعم لدينا على <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          مع أطيب التحيات،<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"cn":{"name":"sm-cn.html","rel":"Templates/ReverifyAddressAccessLimited/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>帳戶存取權限受限<\/h1>\n        <p>您好 {{firstName}}，<\/p>\n\n        <p>您的交易帳戶訪問權限已被限制，因為您的地址未在截止日期前驗證。<\/p>\n        \n        <p>請立即驗證您的地址，否則您的Scope Markets帳戶可能會被關閉。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">驗證地址<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>驗證地址非常簡單——只需登入您的 Scope Markets 帳戶並按照提示操作即可。<\/p>\n\n        <p>如需進一步協助，請聯絡我們的支援團隊，電郵地址為 <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>。<\/p>\n\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"en":{"name":"sm-en.html","rel":"Templates/ReverifyAddressAccessLimited/sm-en.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Account access limited<\/h1>\n        <p>Hi {{firstName}},<\/p>\n\n        <p>Access to your trading account(s) has been limited because your address wasn’t verified before the deadline.<\/p>\n\n        <p>Verify your address now or your Scope Markets account may be closed.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Verify address<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>It’s easy to verify yourself - just log into your Scope Markets account and follow the prompts.<\/p>\n\n        <p>For further assistance, please contact our support team at <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Kind regards,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"es":{"name":"sm-es.html","rel":"Templates/ReverifyAddressAccessLimited/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Acceso a la cuenta limitado<\/h1>\n        <p>Hola {{firstName}},<\/p>\n\n        <p>El acceso a su(s) cuenta(s) de trading ha sido limitado porque su dirección no fue verificada antes de la fecha límite.<\/p>\n        \n        <p>Verifique su dirección ahora o su cuenta de Scope Markets podría ser cerrada.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Verificar dirección<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Verificarse es sencillo: solo inicie sesión en su cuenta de Scope Markets y siga las instrucciones.<\/p>\n\n        <p>Para obtener más ayuda, póngase en contacto con nuestro equipo de soporte en <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Saludos cordiales,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ms":{"name":"sm-ms.html","rel":"Templates/ReverifyAddressAccessLimited/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Akses akaun terhad<\/h1>\n        <p>Hai {{firstName}},<\/p>\n\n        <p>Akses ke akaun dagangan anda telah dihadkan kerana alamat anda tidak disahkan sebelum tarikh akhir.<\/p>\n        \n        <p>Sahkan alamat anda sekarang atau akaun Scope Markets anda mungkin ditutup.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Sahkan alamat<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Ia mudah untuk mengesahkan diri anda – cuma log masuk ke akaun Scope Markets anda dan ikut arahan yang diberikan.<\/p>\n\n        <p>Untuk bantuan lanjut, sila hubungi pasukan sokongan kami di <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Salam mesra,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ru":{"name":"sm-ru.html","rel":"Templates/ReverifyAddressAccessLimited/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Доступ к аккаунту ограничен<\/h1>\n        <p>Здравствуйте, {{firstName}},<\/p>\n\n        <p>Доступ к вашему торговому счету(ам) был ограничен, потому что ваш адрес не был подтвержден до установленного срока.<\/p>\n        \n        <p>Подтвердите свой адрес сейчас, иначе ваш счет в Scope Markets может быть закрыт.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Подтверждение адрес<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Подтвердить адрес очень просто — просто войдите в свою учетную запись Scope Markets и следуйте инструкциям.<\/p>\n\n        <p>Для дополнительной помощи, пожалуйста, свяжитесь с нашей службой поддержки по адресу <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          С уважением,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"th":{"name":"sm-th.html","rel":"Templates/ReverifyAddressAccessLimited/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>การเข้าถึงบัญชีถูกจำกัด<\/h1>\n        <p>เรียนคุณ {{firstName}},<\/p>\n\n        <p>การเข้าถึงบัญชีการซื้อขายของคุณถูกจำกัดเนื่องจากที่อยู่ของคุณไม่ได้รับการยืนยันก่อนกำหนดเวลา<\/p>\n\n        <p>ยืนยันที่อยู่ของคุณตอนนี้หรือบัญชี Scope Markets ของคุณอาจถูกปิด<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">ยืนยันที่อยู่<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>การยืนยันที่อยู่ด้วยตนเองทำได้ง่ายๆเพียงเข้าสู่ระบบบัญชี Scope Markets ของคุณและทำตามขั้นตอน<\/p>\n\n        <p>หากต้องการความช่วยเหลือเพิ่มเติม โปรดติดต่อทีมสนับสนุนของเราที่ <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a><\/p>\n\n        <p>\n          ด้วยความนับถือ,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/ReverifyAddressAccessLimited/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Hesap erişimi sınırlandırıldı<\/h1>\n        <p>Merhaba {{firstName}},<\/p>\n\n        <p>Ticaret hesabınıza erişim, adresiniz son tarihe kadar doğrulanmadığı için kısıtlanmıştır.<\/p>\n\n        <p>Adresinizi şimdi doğrulayın yoksa Scope Markets hesabınız kapatılabilir.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Adresi doğrulayın<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Doğrulama işlemi çok kolaydır - Scope Markets hesabınıza giriş yapın ve talimatları izleyin.<\/p>\n\n        <p>Daha fazla yardım için, lütfen destek ekibimizle <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a> adresinden iletişime geçin.<\/p>\n\n        <p>\n          Saygılarımızla,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/ReverifyAddressAccessLimited/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Truy cập tài khoản bị giới hạn<\/h1>\n        <p>Chào {{firstName}},<\/p>\n\n        <p>Quyền truy cập vào tài khoản giao dịch của bạn đã bị hạn chế vì địa chỉ của bạn chưa được xác minh trước hạn chót.<\/p>\n\n        <p>Hãy xác minh địa chỉ ngay bây giờ, nếu không tài khoản Scope Markets của bạn có thể bị đóng.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Xác minh địa chỉ<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Việc xác minh rất dễ dàng - chỉ cần đăng nhập vào tài khoản Scope Markets của bạn và làm theo hướng dẫn.<\/p>\n\n        <p>Để được hỗ trợ thêm, vui lòng liên hệ với đội ngũ hỗ trợ của chúng tôi tại <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{
