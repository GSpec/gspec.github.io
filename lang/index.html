supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Trân trọng,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/ReverifyAddressAccessLimited/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>账户访问权限受限<\/h1>\n        <p>您好 {{firstName}}，<\/p>\n\n        <p>由于您未在截止日期前验证地址，您的交易账户访问权限已被限制。<\/p>\n\n        <p>请立即验证您的地址，否则您的Scope Markets账户可能会被关闭。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">验证地址<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>验证地址非常简单——只需登录您的 Scope Markets 账户并按照提示操作即可。<\/p>\n\n        <p>如需进一步帮助，请通过 <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a> 联系我们的支持团队。<\/p>\n`\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/ReverifyAddressNotVerified":{"_display":"Templates/ReverifyAddressNotVerified","_key":"Templates/ReverifyAddressNotVerified","ar":{"name":"sm-ar.html","rel":"Templates/ReverifyAddressNotVerified/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>العنوان غير مؤكد<\/h1>\n        <p>مرحباً {{firstName}}،<\/p>\n\n        <p>للامتثال للمتطلبات التنظيمية، نحتاج منك التحقق من عنوانك.<\/p>\n\n        <p>إذا لم تقم بالتحقق من عنوانك، فلن تتمكن من إجراء عمليات السحب وقد يتم إغلاق حسابك في سكوب ماركتس.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">توثيق العنوان:<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>من السهل توثيق العنوان بنفسك - ما عليك سوى تسجيل الدخول إلى حساب Scope Markets الخاص بك واتباع التعليمات.<\/p>\n\n        <p>للمزيد من المساعدة، يرجى الاتصال بفريق الدعم لدينا على <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          مع أطيب التحيات،<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"cn":{"name":"sm-cn.html","rel":"Templates/ReverifyAddressNotVerified/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>地址未經驗證<\/h1>\n        <p>您好 {{firstName}}，<\/p>\n\n        <p>為遵守監管要求，我們需要您驗證您的地址。<\/p>\n        \n        <p>如果您不驗證地址，您將無法進行提款，您的Scope Markets帳戶可能會被關閉。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">驗證地址<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>驗證地址非常簡單——只需登入您的 Scope Markets 帳戶並按照提示操作即可。<\/p>\n\n        <p>如需進一步協助，請聯絡我們的支援團隊，電郵地址為 <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>。<\/p>\n\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"en":{"name":"sm-en.html","rel":"Templates/ReverifyAddressNotVerified/sm-en.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Address not verified<\/h1>\n        <p>Hi {{firstName}},<\/p>\n\n        <p>To comply with regulatory requirements, we need you to verify your address.<\/p>\n\n        <p>If you don't verify your address, you won’t be able to make withdrawals and your Scope Markets account may be closed.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Verify address<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>It’s easy to verify yourself - just log into your Scope Markets account and follow the prompts.<\/p>\n\n        <p>For further assistance, please contact our support team at <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Kind regards,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"es":{"name":"sm-es.html","rel":"Templates/ReverifyAddressNotVerified/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Dirección no verificada<\/h1>\n        <p>Hola {{firstName}},<\/p>\n\n        <p>Para cumplir con los requisitos normativos, necesitamos que verifiques tu dirección.<\/p>\n        \n        <p>Si no verificas tu dirección, no podrás realizar retiros y tu cuenta de Scope Markets podría ser cerrada.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Verificar dirección<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Verificarse es sencillo: solo inicie sesión en su cuenta de Scope Markets y siga las instrucciones.<\/p>\n\n        <p>Para obtener más ayuda, póngase en contacto con nuestro equipo de soporte en <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Saludos cordiales,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ms":{"name":"sm-ms.html","rel":"Templates/ReverifyAddressNotVerified/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Alamat tidak disahkan<\/h1>\n        <p>Hai {{firstName}},<\/p>\n\n        <p>Untuk mematuhi keperluan peraturan, kami memerlukan anda mengesahkan alamat anda.<\/p>\n        \n        <p>Jika anda tidak mengesahkan alamat anda, anda tidak akan dapat membuat pengeluaran dan akaun Scope Markets anda mungkin ditutup.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Sahkan alamat<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Ia mudah untuk mengesahkan diri anda – cuma log masuk ke akaun Scope Markets anda dan ikut arahan yang diberikan.<\/p>\n\n        <p>Untuk bantuan lanjut, sila hubungi pasukan sokongan kami di <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Salam mesra,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ru":{"name":"sm-ru.html","rel":"Templates/ReverifyAddressNotVerified/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Адрес не подтверждён<\/h1>\n        <p>Здравствуйте, {{firstName}},<\/p>\n\n        <p>Чтобы соответствовать требованиям регуляторов, нам необходимо, чтобы вы подтвердили свой адрес.<\/p>\n        \n        <p>Если вы не подтвердите свой адрес, вы не сможете совершать снятие средств, и ваш счет в Scope Markets может быть закрыт.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Подтверждение адрес<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Подтвердить адрес очень просто — просто войдите в свою учетную запись Scope Markets и следуйте инструкциям.<\/p>\n\n        <p>Для дополнительной помощи, пожалуйста, свяжитесь с нашей службой поддержки по адресу <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          С уважением,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"th":{"name":"sm-th.html","rel":"Templates/ReverifyAddressNotVerified/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>ที่อยู่ยังไม่ได้รับการยืนยัน<\/h1>\n        <p>เรียนคุณ {{firstName}},<\/p>\n\n        <p>เพื่อให้เป็นไปตามข้อกำหนดของหน่วยงานกำกับดูแล เราจำเป็นต้องให้คุณยืนยันที่อยู่ของคุณ<\/p>\n\n        <p>หากคุณไม่ยืนยันที่อยู่ คุณจะไม่สามารถถอนเงินได้ และบัญชี Scope Markets ของคุณอาจถูกปิด<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">ยืนยันที่อยู่<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>การยืนยันที่อยู่ด้วยตนเองทำได้ง่ายๆเพียงเข้าสู่ระบบบัญชี Scope Markets ของคุณและทำตามขั้นตอน<\/p>\n\n        <p>หากต้องการความช่วยเหลือเพิ่มเติม โปรดติดต่อทีมสนับสนุนของเราที่ <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a><\/p>\n\n        <p>\n          ด้วยความนับถือ,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/ReverifyAddressNotVerified/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Adres doğrulanmadı<\/h1>\n        <p>Merhaba {{firstName}},<\/p>\n\n        <p>Yasal gerekliliklere uymak için adresinizi doğrulamanız gerekmektedir.<\/p>\n        \n        <p>Adresinizi doğrulamazsanız, para çekme işlemi yapamayacak ve Scope Markets hesabınız kapatılabilir.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Adresi doğrulayın<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Doğrulama işlemi çok kolaydır - Scope Markets hesabınıza giriş yapın ve talimatları izleyin.<\/p>\n\n        <p>Daha fazla yardım için, lütfen destek ekibimizle <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a> adresinden iletişime geçin.<\/p>\n\n        <p>\n          Saygılarımızla,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/ReverifyAddressNotVerified/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Địa chỉ chưa được xác minh<\/h1>\n        <p>Chào {{firstName}},<\/p>\n\n        <p>Yasal gerekliliklere uymak için adresinizi doğrulamanız gerekmektedir.<\/p>\n        \n        <p>Adresinizi doğrulamazsanız, para çekme işlemi yapamayacak ve Scope Markets hesabınız kapatılabilir.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Xác minh địa chỉ<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Việc xác minh rất dễ dàng - chỉ cần đăng nhập vào tài khoản Scope Markets của bạn và làm theo hướng dẫn.<\/p>\n\n        <p>Để được hỗ trợ thêm, vui lòng liên hệ với đội ngũ hỗ trợ của chúng tôi tại <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Trân trọng,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/ReverifyAddressNotVerified/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>地址未验证<\/h1>\n        <p>您好 {{firstName}}，<\/p>\n\n        <p>为了遵守监管要求，我们需要您验证您的地址。<\/p>\n        \n        <p>如果您不验证地址，您将无法进行提款，并且您的Scope Markets账户可能会被关闭。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">验证地址<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>验证地址非常简单——只需登录您的 Scope Markets 账户并按照提示操作即可。<\/p>\n\n        <p>如需进一步帮助，请通过 <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a> 联系我们的支持团队。<\/p>\n`\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/ReverifyAddressPrompt":{"_display":"Templates/ReverifyAddressPrompt","_key":"Templates/ReverifyAddressPrompt","ar":{"name":"sm-ar.html","rel":"Templates/ReverifyAddressPrompt/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>التحقق من عنوانك<\/h1>\n        <p>مرحباً {{firstName}}،<\/p>\n\n        <p>للامتثال للمتطلبات التنظيمية، نحتاج إلى التحقق من عنوانك.<\/p>\n\n        <p>يجب عليك توثيق العنوان خلال {{remainingDays}} يومًا.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">توثيق العنوان:<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>من السهل توثيق العنوان بنفسك - ما عليك سوى تسجيل الدخول إلى حساب Scope Markets الخاص بك واتباع التعليمات.<\/p>\n\n        <p>للمزيد من المساعدة، يرجى الاتصال بفريق الدعم لدينا على <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          مع أطيب التحيات،<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"cn":{"name":"sm-cn.html","rel":"Templates/ReverifyAddressPrompt/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>請核實您的地址<\/h1>\n        <p>您好 {{firstName}}，<\/p>\n\n        <p>為了遵守監管要求，我們需要您驗證您的地址。<\/p>\n\n        <p>您必須在接下來的 {{remainingDays}} 天內驗證您的地址。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">驗證地址<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>驗證地址非常簡單——只需登入您的 Scope Markets 帳戶並按照提示操作即可。<\/p>\n\n        <p>如需進一步協助，請聯絡我們的支援團隊，電郵地址為 <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>。<\/p>\n\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"en":{"name":"sm-en.html","rel":"Templates/ReverifyAddressPrompt/sm-en.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Verify your address<\/h1>\n        <p>Hi {{firstName}},<\/p>\n\n        <p>To comply with regulatory requirements, we need you to verify your address.<\/p>\n\n        <p>You must verify your address within the next {{remainingDays}} days.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Verify address<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>It’s easy to verify yourself - just log into your Scope Markets account and follow the prompts.<\/p>\n\n        <p>For further assistance, please contact our support team at <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Kind regards,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"es":{"name":"sm-es.html","rel":"Templates/ReverifyAddressPrompt/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Verifique su dirección<\/h1>\n        <p>Hola {{firstName}},<\/p>\n\n        <p>Para cumplir con los requisitos regulatorios, necesitamos que verifique su dirección.<\/p>\n\n        <p>Debe verificar su dirección dentro de los próximos {{remainingDays}} días.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Verificar dirección<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Verificarse es sencillo: solo inicie sesión en su cuenta de Scope Markets y siga las instrucciones.<\/p>\n\n        <p>Para obtener más ayuda, póngase en contacto con nuestro equipo de soporte en <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Saludos cordiales,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ms":{"name":"sm-ms.html","rel":"Templates/ReverifyAddressPrompt/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Sahkan alamat anda<\/h1>\n        <p>Hai {{firstName}},<\/p>\n\n        <p>Untuk mematuhi keperluan peraturan, kami memerlukan anda untuk mengesahkan alamat anda.<\/p>\n\n        <p>Anda mesti mengesahkan alamat anda dalam tempoh {{remainingDays}} hari akan datang.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Sahkan alamat<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Ia mudah untuk mengesahkan diri anda – cuma log masuk ke akaun Scope Markets anda dan ikut arahan yang diberikan.<\/p>\n\n        <p>Untuk bantuan lanjut, sila hubungi pasukan sokongan kami di <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Salam mesra,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ru":{"name":"sm-ru.html","rel":"Templates/ReverifyAddressPrompt/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Подтвердите ваш адрес<\/h1>\n        <p>Здравствуйте, {{firstName}},<\/p>\n\n        <p>В соответствии с требованиями регулирующих органов, нам необходимо, чтобы вы подтвердили свой адрес.<\/p>\n\n        <p>Вы должны подтвердить свой адрес в течение следующих {{remainingDays}} дней.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Подтверждение адрес<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Подтвердить адрес очень просто — просто войдите в свою учетную запись Scope Markets и следуйте инструкциям.<\/p>\n\n        <p>Для дополнительной помощи, пожалуйста, свяжитесь с нашей службой поддержки по адресу <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          С уважением,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"th":{"name":"sm-th.html","rel":"Templates/ReverifyAddressPrompt/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>ยืนยันที่อยู่ของคุณ<\/h1>\n        <p>เรียนคุณ {{firstName}},<\/p>\n\n        <p>เพื่อให้เป็นไปตามข้อกำหนดทางกฎหมาย เราจำเป็นต้องขอให้คุณยืนยันที่อยู่ของคุณ<\/p>\n\n        <p>คุณต้องยืนยันที่อยู่ของคุณภายใน {{remainingDays}} วันข้างหน้า<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">ยืนยันที่อยู่<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>การยืนยันที่อยู่ด้วยตนเองทำได้ง่ายๆเพียงเข้าสู่ระบบบัญชี Scope Markets ของคุณและทำตามขั้นตอน<\/p>\n\n        <p>หากต้องการความช่วยเหลือเพิ่มเติม โปรดติดต่อทีมสนับสนุนของเราที่ <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a><\/p>\n\n        <p>\n          ด้วยความนับถือ,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/ReverifyAddressPrompt/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Adresinizi doğrulayın/h1>\n        <p>Merhaba {{firstName}},<\/p>\n\n        <p>Yasal gerekliliklere uymak için adresinizi doğrulamanız gerekmektedir.<\/p>\n\n        <p>Adresinizi önümüzdeki {{remainingDays}} gün içinde doğrulamanız gerekmektedir.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Adresi doğrulayın<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Doğrulama işlemi çok kolaydır - Scope Markets hesabınıza giriş yapın ve talimatları izleyin.<\/p>\n\n        <p>Daha fazla yardım için, lütfen destek ekibimizle <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a> adresinden iletişime geçin.<\/p>\n\n        <p>\n          Saygılarımızla,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/ReverifyAddressPrompt/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Xác minh địa chỉ của bạn/h1>\n        <p>Chào {{firstName}},<\/p>\n\n        <p>Để tuân thủ các quy định, chúng tôi cần bạn xác minh địa chỉ của mình.<\/p>\n\n        <p>Bạn cần xác minh địa chỉ trong vòng {{remainingDays}} ngày tới.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Xác minh địa chỉ<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Việc xác minh rất dễ dàng - chỉ cần đăng nhập vào tài khoản Scope Markets của bạn và làm theo hướng dẫn.<\/p>\n\n        <p>Để được hỗ trợ thêm, vui lòng liên hệ với đội ngũ hỗ trợ của chúng tôi tại <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Trân trọng,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/ReverifyAddressPrompt/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>请核实您的地址/h1>\n        <p>您好 {{firstName}}，<\/p>\n\n        <p>为了遵守监管要求，我们需要您验证您的地址。<\/p>\n\n        <p>您必须在接下来的 {{remainingDays}} 天内验证您的地址。\n<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">验证地址<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>验证地址非常简单——只需登录您的 Scope Markets 账户并按照提示操作即可。<\/p>\n\n        <p>如需进一步帮助，请通过 <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a> 联系我们的支持团队。<\/p>\n`\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/ReverifyIdentityAccessLimited":{"_display":"Templates/ReverifyIdentityAccessLimited","_key":"Templates/ReverifyIdentityAccessLimited","ar":{"name":"sm-ar.html","rel":"Templates/ReverifyIdentityAccessLimited/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>تقييد الدخول إلى الحساب<\/h1>\n        <p>مرحباً {{firstName}}،<\/p>\n\n        <p>تم تقييد الوصول إلى حساب (حسابات) التداول الخاصة بك لعدم اتمام التحقق من الهوية قبل الموعد المحدد<\/p>\n\n        <p>قم بالتحقق من هويتك الآن وإلا قد يتم إغلاق حسابك لدى Scope Markets<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">توثيق الهوية:<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>من السهل توثيق هويتك - ما عليك سوى تسجيل الدخول إلى حسابك في Scope Markets واتباع التعليمات.<\/p>\n\n        <p>للمزيد من المساعدة، يرجى الاتصال بفريق الدعم لدينا على <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          مع أطيب التحيات،<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"cn":{"name":"sm-cn.html","rel":"Templates/ReverifyIdentityAccessLimited/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>帳戶存取權限受限<\/h1>\n        <p>您好 {{firstName}}，<\/p>\n\n        <p>由於您未在截止日期前完成身份驗證，您的交易帳戶存取權限已被限制。<\/p>\n\n        <p>請立即驗證您的身份，否則您的 Scope Markets 帳戶可能會被關閉。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">驗證身份<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>驗證身份非常簡單——只需登入您的 Scope Markets 帳戶並按照提示操作即可。<\/p>\n\n        <p>如需進一步協助，請聯絡我們的支援團隊，電郵地址為 <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>。<\/p>\n\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"en":{"name":"sm-en.html","rel":"Templates/ReverifyIdentityAccessLimited/sm-en.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Account access limited<\/h1>\n        <p>Hi {{firstName}},<\/p>\n\n        <p>Access to your trading account(s) has been limited because your identity wasn’t verified before the deadline.<\/p>\n\n        <p>Verify your identity now or your Scope Markets account may be closed.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Verify identity<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>It’s easy to verify yourself - just log into your Scope Markets account and follow the prompts.<\/p>\n\n        <p>For further assistance, please contact our support team at <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Kind regards,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"es":{"name":"sm-es.html","rel":"Templates/ReverifyIdentityAccessLimited/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Acceso a la cuenta limitado<\/h1>\n        <p>Hola {{firstName}},<\/p>\n\n        <p>El acceso a su(s) cuenta(s) de trading ha sido limitado porque su identidad no fue verificada antes de la fecha límite.<\/p>\n\n        <p>Verifique su identidad ahora o su cuenta de Scope Markets podría ser cerrada.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Verificar identidad<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Verificarse es sencillo: solo inicie sesión en su cuenta de Scope Markets y siga las instrucciones.<\/p>\n\n        <p>Para obtener más ayuda, póngase en contacto con nuestro equipo de soporte en <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Saludos cordiales,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ms":{"name":"sm-ms.html","rel":"Templates/ReverifyIdentityAccessLimited/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Akses akaun terhad<\/h1>\n        <p>Hai {{firstName}},<\/p>\n\n        <p>Akses ke akaun dagangan anda telah dihadkan kerana identiti anda tidak disahkan sebelum tarikh akhir.<\/p>\n\n        <p>Sahkan identiti anda sekarang atau akaun Scope Markets anda mungkin akan ditutup.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Sahkan identiti<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Ia mudah untuk mengesahkan diri anda – cuma log masuk ke akaun Scope Markets anda dan ikut arahan yang diberikan.<\/p>\n\n        <p>Untuk bantuan lanjut, sila hubungi pasukan sokongan kami di <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Salam mesra,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ru":{"name":"sm-ru.html","rel":"Templates/ReverifyIdentityAccessLimited/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Доступ к аккаунту ограничен/h1>\n        <p>Здравствуйте, {{firstName}},<\/p>\n\n        <p>Доступ к вашим торговым счетам ограничен, поскольку ваша личность не была подтверждена до истечения срока.<\/p>\n\n        <p>Подтвердите свою личность сейчас, иначе ваш счет в Scope Markets может быть закрыт.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Подтверждение личности<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Подтвердить свою личность очень просто — просто войдите в свою учетную запись Scope Markets и следуйте инструкциям.<\/p>\n\n        <p>Для дополнительной помощи, пожалуйста, свяжитесь с нашей службой поддержки по адресу <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          С уважением,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"th":{"name":"sm-th.html","rel":"Templates/ReverifyIdentityAccessLimited/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>การเข้าถึงบัญชีถูกจำกัด<\/h1>\n        <p>เรียนคุณ {{firstName}},<\/p>\n\n        <p>การเข้าถึงบัญชีซื้อขายของคุณถูกจำกัด เนื่องจากคุณไม่ได้ยืนยันตัวตนก่อนถึงกำหนดเวลา<\/p>\n\n        <p>ยืนยันตัวตนของคุณตอนนี้ มิเช่นนั้นบัญชี Scope Markets ของคุณอาจถูกปิด<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">ยืนยันตัวตน<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>การยืนยันตัวตนทำได้ง่ายๆเพียงเข้าสู่ระบบบัญชี Scope Markets ของคุณและทำตามขั้นตอน<\/p>\n\n        <p>หากต้องการความช่วยเหลือเพิ่มเติม โปรดติดต่อทีมสนับสนุนของเราที่ <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a><\/p>\n\n        <p>\n          ด้วยความนับถือ,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/ReverifyIdentityAccessLimited/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Hesap erişimi sınırlandırıldı<\/h1>\n        <p>Merhaba {{firstName}},<\/p>\n\n        <p>Son tarih öncesinde kimliğiniz doğrulanmadığı için işlem hesaplarınıza erişiminiz sınırlandırılmıştır.<\/p>\n\n        <p>Kimliğinizi şimdi doğrulayın, aksi takdirde Scope Markets hesabınız kapatılabilir.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Kimliği doğrulayın<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Kimliğinizi doğrulamak çok kolaydır - Scope Markets hesabınıza giriş yapın ve talimatları izleyin.<\/p>\n\n        <p>Daha fazla yardım için, lütfen destek ekibimizle <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a> adresinden iletişime geçin.<\/p>\n\n        <p>\n          Saygılarımızla,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/ReverifyIdentityAccessLimited/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Truy cập tài khoản bị giới hạn<\/h1>\n        <p>Chào {{firstName}},<\/p>\n\n        <p>Quyền truy cập vào tài khoản giao dịch của bạn đã bị hạn chế vì danh tính của bạn chưa được xác minh trước hạn chót.<\/p>\n\n        <p>Hãy xác minh danh tính ngay bây giờ hoặc tài khoản Scope Markets của bạn có thể bị đóng.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Xác minh danh tính<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Việc xác minh rất dễ - chỉ cần đăng nhập vào tài khoản Scope Markets của bạn và làm theo hướng dẫn.<\/p>\n\n        <p>Để được hỗ trợ thêm, vui lòng liên hệ với đội ngũ hỗ trợ của chúng tôi tại <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Trân trọng,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/ReverifyIdentityAccessLimited/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>账户访问权限受限<\/h1>\n        <p>您好 {{firstName}}，<\/p>\n\n        <p>由于您未在截止日期前完成身份验证，您的交易账户访问权限已被限制。<\/p>\n\n        <p>请立即验证您的身份，否则您的 Scope Markets 账户可能会被关闭。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">验证身份<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>验证身份非常简单——只需登录您的 Scope Markets 账户并按照提示操作即可。<\/p>\n\n        <p>如需进一步帮助，请通过 <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a> 联系我们的支持团队。<\/p>\n\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/ReverifyIdentityNotVerified":{"_display":"Templates/ReverifyIdentityNotVerified","_key":"Templates/ReverifyIdentityNotVerified","ar":{"name":"sm-ar.html","rel":"Templates/ReverifyIdentityNotVerified/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>الهوية غير مؤكدة<\/h1>\n        <p>مرحباً {{firstName}}،<\/p>\n\n        <p>للامتثال للمتطلبات التنظيمية، نحتاج إلى التحقق من هويتك.<\/p>\n\n        <p>إذا لم تقم بالتحقق من الهوية، فلن تتمكن من إجراء عمليات السحب وقد يتم إغلاق حسابك لدى Scope Markets.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">توثيق الهوية:<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>من السهل توثيق هويتك - ما عليك سوى تسجيل الدخول إلى حسابك في Scope Markets واتباع التعليمات.<\/p>\n\n        <p>للمزيد من المساعدة، يرجى الاتصال بفريق الدعم لدينا على <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          مع أطيب التحيات،<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"cn":{"name":"sm-cn.html","rel":"Templates/ReverifyIdentityNotVerified/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>身份尚未驗證<\/h1>\n        <p>您好 {{firstName}}，<\/p>\n\n        <p>為了遵守監管要求，我們需要您驗證身分。<\/p>\n\n        <p>如果您不驗證身份，您將無法提款，並且您的 Scope Markets 帳戶可能會被關閉。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">驗證身份<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>驗證身份非常簡單——只需登入您的 Scope Markets 帳戶並按照提示操作即可。<\/p>\n\n        <p>如需進一步協助，請聯絡我們的支援團隊，電郵地址為 <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>。<\/p>\n\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"en":{"name":"sm-en.html","rel":"Templates/ReverifyIdentityNotVerified/sm-en.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Identity not verified<\/h1>\n        <p>Hi {{firstName}},<\/p>\n\n        <p>To comply with regulatory requirements, we need you to verify your identity.<\/p>\n\n        <p>If you don't verify your identity, you won’t be able to make withdrawals and your Scope Markets account may be closed.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Verify identity<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>It’s easy to verify yourself - just log into your Scope Markets account and follow the prompts.<\/p>\n\n        <p>For further assistance, please contact our support team at <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Kind regards,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"es":{"name":"sm-es.html","rel":"Templates/ReverifyIdentityNotVerified/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Identidad no verificada<\/h1>\n        <p>Hola {{firstName}},<\/p>\n\n        <p>Para cumplir con los requisitos regulatorios, necesitamos que verifique su identidad.<\/p>\n\n        <p>Si no verifica su identidad, no podrá realizar retiros y su cuenta de Scope Markets podría ser cerrada.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Verificar identidad<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Verificarse es sencillo: solo inicie sesión en su cuenta de Scope Markets y siga las instrucciones.<\/p>\n\n        <p>Para obtener más ayuda, póngase en contacto con nuestro equipo de soporte en <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Saludos cordiales,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ms":{"name":"sm-ms.html","rel":"Templates/ReverifyIdentityNotVerified/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Identiti tidak disahkan<\/h1>\n        <p>Hai {{firstName}},<\/p>\n\n        <p>Untuk mematuhi keperluan peraturan, kami memerlukan anda untuk mengesahkan identiti anda.<\/p>\n\n        <p>Jika anda tidak mengesahkan identiti anda, anda tidak akan dapat membuat pengeluaran dan akaun Scope Markets anda mungkin akan ditutup.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Sahkan identiti<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Ia mudah untuk mengesahkan diri anda – cuma log masuk ke akaun Scope Markets anda dan ikut arahan yang diberikan.<\/p>\n\n        <p>Untuk bantuan lanjut, sila hubungi pasukan sokongan kami di <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Salam mesra,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ru":{"name":"sm-ru.html","rel":"Templates/ReverifyIdentityNotVerified/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Идентификация не подтверждена<\/h1>\n        <p>Здравствуйте, {{firstName}},<\/p>\n\n        <p>В соответствии с требованиями регулирующих органов, нам необходимо, чтобы вы подтвердили свою личность.<\/p>\n\n        <p>Если вы не подтвердите свою личность, вы не сможете совершать вывод средств, и ваш счет в Scope Markets может быть закрыт.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Подтверждение личности<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Подтвердить свою личность очень просто — просто войдите в свою учетную запись Scope Markets и следуйте инструкциям.<\/p>\n\n        <p>Для дополнительной помощи, пожалуйста, свяжитесь с нашей службой поддержки по адресу <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          С уважением,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"th":{"name":"sm-th.html","rel":"Templates/ReverifyIdentityNotVerified/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>ยังไม่ได้ยืนยันตัวตน<\/h1>\n        <p>เรียนคุณ {{firstName}},<\/p>\n\n        <p>เพื่อให้เป็นไปตามข้อกำหนดทางกฎหมาย เราจำเป็นต้องขอให้คุณยืนยันตัวตนของคุณ<\/p>\n\n        <p>หากคุณไม่ยืนยันตัวตน คุณจะไม่สามารถถอนเงินได้ และบัญชี Scope Markets ของคุณอาจถูกปิด<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">ยืนยันตัวตน<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>การยืนยันตัวตนทำได้ง่ายๆเพียงเข้าสู่ระบบบัญชี Scope Markets ของคุณและทำตามขั้นตอน<\/p>\n\n        <p>หากต้องการความช่วยเหลือเพิ่มเติม โปรดติดต่อทีมสนับสนุนของเราที่ <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a><\/p>\n\n        <p>\n          ด้วยความนับถือ,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/ReverifyIdentityNotVerified/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Kimlik doğrulanmadı<\/h1>\n        <p>Merhaba {{firstName}},<\/p>\n\n        <p>Yasal gerekliliklere uymak için kimliğinizi doğrulamanız gerekmektedir.<\/p>\n\n        <p>Kimliğinizi doğrulamazsanız, para çekme işlemi yapamazsınız ve Scope Markets hesabınız kapatılabilir.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Kimliği doğrulayın<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Kimliğinizi doğrulamak çok kolaydır - Scope Markets hesabınıza giriş yapın ve talimatları izleyin.<\/p>\n\n        <p>Daha fazla yardım için, lütfen destek ekibimizle <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a> adresinden iletişime geçin.<\/p>\n\n        <p>\n          Saygılarımızla,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/ReverifyIdentityNotVerified/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Danh tính chưa được xác minh<\/h1>\n        <p>Chào {{firstName}},<\/p>\n\n        <p>Để tuân thủ các yêu cầu pháp lý, chúng tôi cần bạn xác minh danh tính của mình.<\/p>\n\n        <p>Nếu bạn không xác minh danh tính, bạn sẽ không thể thực hiện rút tiền và tài khoản Scope Markets của bạn có thể bị khóa.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Xác minh danh tính<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Việc xác minh rất dễ - chỉ cần đăng nhập vào tài khoản Scope Markets của bạn và làm theo hướng dẫn.<\/p>\n\n        <p>Để được hỗ trợ thêm, vui lòng liên hệ với đội ngũ hỗ trợ của chúng tôi tại <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Trân trọng,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/ReverifyIdentityNotVerified/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>身份未验证<\/h1>\n        <p>您好 {{firstName}}，<\/p>\n\n        <p>为了遵守监管要求，我们需要您验证身份。<\/p>\n\n        <p>如果您不验证身份，您将无法进行提款，并且您的 Scope Markets 账户可能会被关闭。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">验证身份<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>验证身份非常简单——只需登录您的 Scope Markets 账户并按照提示操作即可。<\/p>\n\n        <p>如需进一步帮助，请通过 <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a> 联系我们的支持团队。<\/p>\n\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/ReverifyIdentityPrompt":{"_display":"Templates/ReverifyIdentityPrompt","_key":"Templates/ReverifyIdentityPrompt","ar":{"name":"sm-ar.html","rel":"Templates/ReverifyIdentityPrompt/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>التحقق من هويتك<\/h1>\n        <p>مرحباً {{firstName}}،<\/p>\n\n        <p>للامتثال للمتطلبات التنظيمية، نحتاج إلى التحقق من هويتك.<\/p>\n\n        <p>يجب توثيق هويتك في غضون {{remainingDays}} أيام.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">توثيق الهوية:<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>من السهل توثيق هويتك - ما عليك سوى تسجيل الدخول إلى حسابك في Scope Markets واتباع التعليمات.<\/p>\n\n        <p>للمزيد من المساعدة، يرجى الاتصال بفريق الدعم لدينا على <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          مع أطيب التحيات،<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"cn":{"name":"sm-cn.html","rel":"Templates/ReverifyIdentityPrompt/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>驗證您的身份<\/h1>\n        <p>您好 {{firstName}}，<\/p>\n\n        <p>為了遵守監管要求，我們需要您驗證身分。<\/p>\n\n        <p>您必須在接下來的 {{remainingDays}} 天內完成身份驗證。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">驗證身份<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>驗證身份非常簡單——只需登入您的 Scope Markets 帳戶並按照提示操作即可。<\/p>\n\n        <p>如需進一步協助，請聯絡我們的支援團隊，電郵地址為 <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>。<\/p>\n\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"en":{"name":"sm-en.html","rel":"Templates/ReverifyIdentityPrompt/sm-en.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Verify your identity<\/h1>\n        <p>Hi {{firstName}},<\/p>\n\n        <p>To comply with regulatory requirements, we need you to verify your identity.<\/p>\n\n        <p>You must verify your identity within the next {{remainingDays}} days.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Verify identity<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>It’s easy to verify yourself - just log into your Scope Markets account and follow the prompts.<\/p>\n\n        <p>For further assistance, please contact our support team at <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Kind regards,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"es":{"name":"sm-es.html","rel":"Templates/ReverifyIdentityPrompt/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Verifique su identidad<\/h1>\n        <p>Hola {{firstName}},<\/p>\n\n        <p>Para cumplir con los requisitos regulatorios, necesitamos que verifique su identidad.<\/p>\n\n        <p>Debe verificar su identidad dentro de los próximos {{remainingDays}} días.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Verificar identidad<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Verificarse es sencillo: solo inicie sesión en su cuenta de Scope Markets y siga las instrucciones.<\/p>\n\n        <p>Para obtener más ayuda, póngase en contacto con nuestro equipo de soporte en <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Saludos cordiales,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ms":{"name":"sm-ms.html","rel":"Templates/ReverifyIdentityPrompt/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Sahkan identiti anda<\/h1>\n        <p>Hai {{firstName}},<\/p>\n\n        <p>Untuk mematuhi keperluan peraturan, kami memerlukan anda untuk mengesahkan identiti anda.<\/p>\n\n        <p>Anda mesti mengesahkan identiti anda dalam tempoh {{remainingDays}} hari akan datang.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Sahkan identiti<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Ia mudah untuk mengesahkan diri anda – cuma log masuk ke akaun Scope Markets anda dan ikut arahan yang diberikan.<\/p>\n\n        <p>Untuk bantuan lanjut, sila hubungi pasukan sokongan kami di <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Salam mesra,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ru":{"name":"sm-ru.html","rel":"Templates/ReverifyIdentityPrompt/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Подтвердите свою личность<\/h1>\n        <p>Здравствуйте, {{firstName}},<\/p>\n\n        <p>В соответствии с требованиями регулирующих органов, нам необходимо, чтобы вы подтвердили свою личность.<\/p>\n\n        <p>Вы должны подтвердить свою личность в течение следующих {{remainingDays}} дней.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Подтверждение личности<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Подтвердить свою личность очень просто — просто войдите в свою учетную запись Scope Markets и следуйте инструкциям.<\/p>\n\n        <p>Для дополнительной помощи, пожалуйста, свяжитесь с нашей службой поддержки по адресу <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          С уважением,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"th":{"name":"sm-th.html","rel":"Templates/ReverifyIdentityPrompt/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>ยืนยันตัวตนของคุณ<\/h1>\n        <p>เรียนคุณ {{firstName}},<\/p>\n\n        <p>เพื่อให้เป็นไปตามข้อกำหนดทางกฎหมาย เราจำเป็นต้องขอให้คุณยืนยันตัวตนของคุณ<\/p>\n\n        <p>คุณต้องยืนยันตัวตนภายใน {{remainingDays}} วันข้างหน้า<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">ยืนยันตัวตน<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>การยืนยันตัวตนทำได้ง่ายๆเพียงเข้าสู่ระบบบัญชี Scope Markets ของคุณและทำตามขั้นตอน<\/p>\n\n        <p>หากต้องการความช่วยเหลือเพิ่มเติม โปรดติดต่อทีมสนับสนุนของเราที่ <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a><\/p>\n\n        <p>\n          ด้วยความนับถือ,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/ReverifyIdentityPrompt/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Kimliğinizi doğrulayın<\/h1>\n        <p>Merhaba {{firstName}},<\/p>\n\n        <p>Yasal gerekliliklere uymak için kimliğinizi doğrulamanız gerekmektedir.<\/p>\n\n        <p>Kimliğinizi önümüzdeki {{remainingDays}} gün içinde doğrulamanız gerekmektedir.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Kimliği doğrulayın<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Kimliğinizi doğrulamak çok kolaydır - Scope Markets hesabınıza giriş yapın ve talimatları izleyin.<\/p>\n\n        <p>Daha fazla yardım için, lütfen destek ekibimizle <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a> adresinden iletişime geçin.<\/p>\n\n        <p>\n          Saygılarımızla,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/ReverifyIdentityPrompt/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Xác minh danh tính của bạn<\/h1>\n        <p>Chào {{firstName}},<\/p>\n\n        <p>Để tuân thủ các yêu cầu pháp lý, chúng tôi cần bạn xác minh danh tính của mình.<\/p>\n\n        <p>Bạn phải xác minh danh tính trong vòng {{remainingDays}} ngày tới.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Xác minh danh tính<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Việc xác minh rất dễ - chỉ cần đăng nhập vào tài khoản Scope Markets của bạn và làm theo hướng dẫn.<\/p>\n\n        <p>Để được hỗ trợ thêm, vui lòng liên hệ với đội ngũ hỗ trợ của chúng tôi tại <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a>.<\/p>\n\n        <p>\n          Trân trọng,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/ReverifyIdentityPrompt/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>验证您的身份<\/h1>\n        <p>您好 {{firstName}}，<\/p>\n\n        <p>为了遵守监管要求，我们需要您验证身份。<\/p>\n\n        <p>您必须在接下来的 {{remainingDays}} 天内完成身份验证。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">验证身份<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>验证身份非常简单——只需登录您的 Scope Markets 账户并按照提示操作即可。<\/p>\n\n        <p>如需进一步帮助，请通过 <a href=\"mailto:{{supportEmailAddress}}\" target=\"_blank\">{{supportEmailAddress}}<\/a> 联系我们的支持团队。<\/p>\n\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/TradingAccountOpened":{"_display":"Templates/TradingAccountOpened","_key":"Templates/TradingAccountOpened","ar":{"name":"sm-ar.html","rel":"Templates/TradingAccountOpened/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>تم فتح حساب التداول الجديد الخاص بك.<\/h1>\n        <h3>مرحباً {{firstName}}،<\/h3>\n        <p class=\"gap-after-paragraph\">يمكنك الآن القيام بالإيداع وبدء التداول.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">قم بالإيداع الآن<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>تفاصيل حساب التداول {{platform}} الخاص بك<\/p>\n        <p>رقم الحساب: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">اسم الخادم: {{serverName}}<\/p>\n        \n        <p>للعثور على كلمة مرور {{platform}} الخاصة بك:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">قم بتسجيل الدخول إلى حساب Scope Markets الخاص بك باستخدام البريد الإلكتروني وكلمة المرور التي استخدمتها للتسجيل<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">انتقل إلى علامة التبويب ”الصفحة الرئيسية“<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">اضغط على ”تفاصيل تسجيل الدخول“ بجوار رقم حساب التداول الخاص بك<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>إذا كنت بحاجة إلى المساعدة، فنحن هنا لمساعدتك!<\/p>\n\n        <p>\n          مع أطيب التحيات،<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"cn":{"name":"sm-cn.html","rel":"Templates/TradingAccountOpened/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>您的新交易帳戶已開通。<\/h1>\n        <h3>您好 {{firstName}}，<\/h3>\n        <p class=\"gap-after-paragraph\">現在您可以進行充值並開始交易。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">立即儲值<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>您的 {{platform}} 交易帳戶詳情<\/p>\n        <p>登入名稱：{{login}}<\/p>\n        <p class=\"gap-after-paragraph\">伺服器名稱：{{serverName}}<\/p>\n        \n        <p>尋找您的 {{platform}} 密碼：/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">使用您註冊時使用的郵箱和密碼登入您的 Scope Markets 帳戶<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">前往「首頁」標籤<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">點擊您交易帳號旁的“登入詳情”<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>如果您需要任何協助，我們隨時為您服務！<\/p>\n\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"en":{"name":"sm-en.html","rel":"Templates/TradingAccountOpened/sm-en.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Your new trading account has been opened<\/h1>\n        <h3>Hi {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">You can now make a deposit and start trading.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Deposit now<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Your {{platform}} trading account details<\/p>\n        <p>Login: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">Server name: {{serverName}}<\/p>\n\n        <p>To find your {{platform}} password:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">\n                  Log in to your Scope Markets account with the email and password you used to\n                  register\n                <\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Go to the 'Home' tab<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">\n                  Click 'Login details' next to your trading account number\n                <\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>If you need a hand, we're here to help!<\/p>\n\n        <p>\n          Kind regards,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n"},"es":{"name":"sm-es.html","rel":"Templates/TradingAccountOpened/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Su nueva cuenta de trading ha sido abierta.<\/h1>\n        <h3>Hola {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">Ahora puede hacer un depósito y comenzar a operar.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Depositar ahora<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Detalles de su cuenta de trading {{platform}}<\/p>\n        <p>Usuario: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">Nombre del servidor: {{serverName}}<\/p>\n\n        <p>Para encontrar su contraseña en {{platform}}:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Inicie sesión en su cuenta de Scope Markets con el correo electrónico y la contraseña que utilizó para registrarse<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Vaya a la pestaña 'Inicio'<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Haga clic en 'Detalles de inicio de sesión' junto al número de su cuenta de trading<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>Si necesita ayuda, ¡estamos aquí para ayudarle!<\/p>\n\n        <p>\n          Saludos cordiales,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ms":{"name":"sm-ms.html","rel":"Templates/TradingAccountOpened/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Akaun dagangan baru anda telah dibuka.<\/h1>\n        <h3>Hai {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">Anda kini boleh membuat deposit dan mula berdagang.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Deposit sekarang<\/a>\n        <!--[
