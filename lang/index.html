if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Maklumat akaun dagangan {{platform}} anda/p>\n        <p>Login: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">Nama server: {{serverName}}<\/p>\n        \n        <p>Cara mendapatkan kata laluan {{platform}} anda:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Log masuk ke akaun Scope Markets anda menggunakan emel dan kata laluan yang anda gunakan semasa mendaftar<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Pergi ke tab 'Home'<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Klik 'Login details' di sebelah nombor akaun dagangan anda<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>Jika anda memerlukan bantuan, kami sedia membantu!<\/p>\n\n        <p>\n          Salam mesra,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ru":{"name":"sm-ru.html","rel":"Templates/TradingAccountOpened/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Ваш новый торговый счет открыт.<\/h1>\n        <h2>Готовы к торговле?<\/h2>\n        <h3>Привет, {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">Теперь вы можете внести депозит и начать торговлю.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Внести депозит сейчас<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Данные вашего торгового счета {{platform}}<\/p>\n        <p>Вход: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">Имя сервера: {{serverName}}<\/p>\n        \n        <p>Чтобы узнать свой пароль от {{platform}}:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Войдите в свой аккаунт Scope Markets, используя адрес электронной почты и пароль, которые вы использовали при регистрации<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Перейдите на вкладку «Главная»<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Нажмите «Данные для входа» рядом с номером вашего торгового счета<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>Если вам нужна помощь, мы здесь, чтобы помочь!<\/p>\n\n        <p>\n          С уважением,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"th":{"name":"sm-th.html","rel":"Templates/TradingAccountOpened/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>บัญชีซื้อขายใหม่ของคุณได้เปิดใช้งานแล้ว<\/h1>\n        <h3>เรียนคุณ {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">ตอนนี้คุณสามารถฝากเงินและเริ่มซื้อขายได้เลย<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">ฝากเงินตอนนี้<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>รายละเอียดบัญชีซื้อขาย {{platform}} ของคุณ<\/p>\n        <p>เข้าสู่ระบบ: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">ชื่อเซิร์ฟเวอร์: {{serverName}}<\/p>\n        \n        <p>วิธีค้นหารหัสผ่าน {{platform}} ของคุณ:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">เข้าสู่ระบบบัญชี Scope Markets ของคุณด้วยอีเมลและรหัสผ่านที่คุณใช้ลงทะเบียน<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">ไปที่แท็บ 'หน้าหลัก'<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">คลิก 'รายละเอียดการเข้าสู่ระบบ' ถัดจากหมายเลขบัญชีซื้อขายของคุณ<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>หากคุณต้องการความช่วยเหลือใดๆ เราพร้อมบริการคุณ!<\/p>\n\n        <p>\n          ด้วยความนับถือ,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/TradingAccountOpened/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Yeni islem hesabınız açılmıştır.<\/h1>\n        <h3>Merhaba {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">Artık para yatırabilir ve isleme başlayabilirsiniz.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Şimdi para yatırın<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>{{platform}} islem hesabı bilgileriniz<\/p>\n        <p>Giriş: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">Sunucu adı: {{serverName}}<\/p>\n        \n        <p>{{platform}} şifrenizi bulmak için:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Kayıt olurken kullandığınız e-posta adresi ve şifre ile Scope Markets hesabınıza giriş yapın<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">“Ana Sayfa” sekmesine gidin<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Ticaret hesap numaranızın yanındaki “Giriş bilgileri”ni tıklayın<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>Yardıma ihtiyacınız olursa, biz buradayız!<\/p>\n\n        <p>\n          Saygılarımızla,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/TradingAccountOpened/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Tài khoản giao dịch mới của bạn đã được mở.<\/h1>\n        <h3>Chào {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">Bây giờ bạn có thể nạp tiền và bắt đầu giao dịch.<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Nạp tiền ngay<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>Chi tiết tài khoản giao dịch {{platform}} của bạn<\/p>\n        <p>Đăng nhập: {{login}}<\/p>\n        <p class=\"gap-after-paragraph\">Tên máy chủ: {{serverName}}<\/p>\n        \n        <p>Để tìm mật khẩu {{platform}} của bạn:<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Đăng nhập vào tài khoản Scope Markets của bạn bằng email và mật khẩu bạn đã dùng để đăng ký<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Vào tab 'Trang chủ'<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">Nhấn vào 'Chi tiết đăng nhập' bên cạnh số tài khoản giao dịch của bạn<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>Nếu bạn cần hỗ trợ, chúng tôi luôn sẵn sàng giúp đỡ!<\/p>\n\n        <p>\n          Trân trọng,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/TradingAccountOpened/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>您的新交易账户已开通。<\/h1>\n        <h3>您好 {{firstName}}，<\/h3>\n        <p class=\"gap-after-paragraph\">您现在可以进行充值并开始交易。<\/p>\n\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">立即充值<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n\n        <p>您的 {{platform}} 交易账户详情<\/p>\n        <p>登录名：{{login}}<\/p>\n        <p class=\"gap-after-paragraph\">服务器名称：{{serverName}}<\/p>\n        \n        <p>查找您的 {{platform}} 密码：<\/p>\n        <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n          <tbody>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">1<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">使用您注册时使用的邮箱和密码登录您的 Scope Markets 账户<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">2<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">前往“首页”选项卡<\/p>\n              <\/td>\n            <\/tr>\n            <tr>\n              <td style=\"width: 24px\">\n                <p class=\"bold number\">3<\/p>\n              <\/td>\n              <td style=\"width: 20px\"><\/td>\n              <td>\n                <p class=\"bold\">点击您交易账户号码旁边的“登录详情”<\/p>\n              <\/td>\n            <\/tr>\n          <\/tbody>\n        <\/table>\n\n        <p>如果您需要任何帮助，我们随时为您服务！<\/p>\n\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/TransferCompleted":{"_display":"Templates/TransferCompleted","_key":"Templates/TransferCompleted","ar":{"name":"sm-ar.html","rel":"Templates/TransferCompleted/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>تم إتمام التحويل<\/h1>\n        <h3>مرحباً {{firstName}}،<\/h3>\n        <p class=\"gap-after-paragraph\">تم إتمام تحويلك.<\/p>\n\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>معرّف الدفع: {{paymentId}}<\/strong><\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>تم الخصم من: {{debitedAccountName}} {{debitedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>المبلغ المسحوب: {{debitedCurrencyCode}} {{debitedAmount}}<\/strong><\/p>\n\n        <p><span class=\"list-bullet-point\"><\/span><strong>تم الإيداع في: {{creditedAccountName}} {{creditedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>المبلغ المودع: {{creditedCurrencyCode}} {{creditedAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">تسجيل الدخول<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"\n          margin-top: 30px;\n          margin-bottom: 20px;\n        \">\n          إذا كنت لا تتعرف على هذه المعاملة، يرجى <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">الاتصال بنا<\/a>.\n        <\/p>\n        <p>\n          مع أطيب التحيات،<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"cn":{"name":"sm-cn.html","rel":"Templates/TransferCompleted/sm-cn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>轉帳完成<\/h1>\n        <h3>您好 {{firstName}}，<\/h3>\n        <p class=\"gap-after-paragraph\">您的轉帳已完成。<\/p>\n\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>付款編號：{{paymentId}}<\/strong><\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>扣款來自：{{debitedAccountName}} {{debitedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>扣除金額：{{debitedCurrencyCode}} {{debitedAmount}}<\/strong><\/p>\n\n        <p><span class=\"list-bullet-point\"><\/span><strong>入帳至：{{creditedAccountName}} {{creditedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>入帳金額：{{creditedCurrencyCode}} {{creditedAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">登入<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"\n          margin-top: 30px;\n          margin-bottom: 20px;\n        \">\n          如果您對此交易有任何疑問，請 <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">與我們聯繫<\/a>。\n        <\/p>\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"en":{"name":"sm-en.html","rel":"Templates/TransferCompleted/sm-en.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n  <tr>\n    <td>\n      <h1>Transfer completed<\/h1>\n      <h3>Hi {{firstName}},<\/h3>\n      <p class=\"gap-after-paragraph\">Your transfer has been completed.<\/p>\n\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Payment ID: {{paymentId}}<\/strong><\/p>\n      \n      <p><span class=\"list-bullet-point\"><\/span><strong>Debited from: {{debitedAccountName}} {{debitedTradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Amount debited: {{debitedCurrencyCode}} {{debitedAmount}}<\/strong><\/p>\n\n      <p><span class=\"list-bullet-point\"><\/span><strong>Credited to: {{creditedAccountName}} {{creditedTradingAccountId}}<\/strong><\/p>\n      <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Amount credited: {{creditedCurrencyCode}} {{creditedAmount}}<\/strong><\/p>\n\n      <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n      <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Log in<\/a>\n      <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      \n      <p style=\"margin-top: 30px;margin-bottom: 20px;\">\n        If you don't recognise this transaction, please <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">contact us<\/a>.\n      <\/p>\n      <p>\n        Kind regards,<br />\n        Scope Markets\n      <\/p>\n    <\/td>\n  <\/tr>\n  <\/tbody>\n<\/table>\n"},"es":{"name":"sm-es.html","rel":"Templates/TransferCompleted/sm-es.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Transferencia completada<\/h1>\n        <h3>Hola {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">Su transferencia se ha completado.<\/p>\n\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>ID de pago: {{paymentId}}<\/strong><\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>Debitado de: {{debitedAccountName}} {{debitedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Monto debitado: {{debitedCurrencyCode}} {{debitedAmount}}<\/strong><\/p>\n\n        <p><span class=\"list-bullet-point\"><\/span><strong>Acreditado a: {{creditedAccountName}} {{creditedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Monto acreditado: {{creditedCurrencyCode}} {{creditedAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Iniciar sesión<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"\n          margin-top: 30px;\n          margin-bottom: 20px;\n        \">\n          Si no reconoce esta transacción, por favor <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">contáctenos<\/a>.\n        <\/p>\n        <p>\n          Saludos cordiales,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ms":{"name":"sm-ms.html","rel":"Templates/TransferCompleted/sm-ms.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Pemindahan selesai<\/h1>\n        <h3>Hai {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">Pemindahan anda telah selesai.<\/p>\n\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>ID pembayaran: {{paymentId}}<\/strong><\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>Didebit dari: {{debitedAccountName}} {{debitedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Jumlah didebit: {{debitedCurrencyCode}} {{debitedAmount}}<\/strong><\/p>\n\n        <p><span class=\"list-bullet-point\"><\/span><strong>Dikreditkan ke: {{creditedAccountName}} {{creditedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Jumlah dikreditkan: {{creditedCurrencyCode}} {{creditedAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Log masuk<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"\n          margin-top: 30px;\n          margin-bottom: 20px;\n        \">\n          Jika anda tidak mengenali transaksi ini, sila <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">hubungi kami<\/a>.\n        <\/p>\n        <p>\n          Salam mesra,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"ru":{"name":"sm-ru.html","rel":"Templates/TransferCompleted/sm-ru.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Перевод завершён<\/h1>\n        <h3>Здравствуйте, {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">Ваш перевод был завершён.<\/p>\n\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Идентификатор платежа: {{paymentId}}<\/strong><\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>Списано с: {{debitedAccountName}} {{debitedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Сумма списания: {{debitedCurrencyCode}} {{debitedAmount}}<\/strong><\/p>\n\n        <p><span class=\"list-bullet-point\"><\/span><strong>Зачислено на: {{creditedAccountName}} {{creditedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Зачисленная сумма: {{creditedCurrencyCode}} {{creditedAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Вход<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"\n          margin-top: 30px;\n          margin-bottom: 20px;\n        \">\n          Если вы не узнаете эту транзакцию, пожалуйста, <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">свяжитесь с нами<\/a>.\n        <\/p>\n        <p>\n          С уважением,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"th":{"name":"sm-th.html","rel":"Templates/TransferCompleted/sm-th.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>การโอนเสร็จสมบูรณ์<\/h1>\n        <h3>เรียนคุณ {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">การโอนของคุณเสร็จสมบูรณ์แล้ว<\/p>\n\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>รหัสการชำระเงิน: {{paymentId}}<\/strong><\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>หักเงินจาก: {{debitedAccountName}} {{debitedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>จำนวนเงินที่หัก: {{debitedCurrencyCode}} {{debitedAmount}}<\/strong><\/p>\n\n        <p><span class=\"list-bullet-point\"><\/span><strong>โอนเข้าบัญชี: {{creditedAccountName}} {{creditedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>จำนวนเงินที่ได้รับ: {{creditedCurrencyCode}} {{creditedAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">เข้าสู่ระบบ<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"\n          margin-top: 30px;\n          margin-bottom: 20px;\n        \">\n          หากคุณไม่แน่ใจเกี่ยวกับธุรกรรมนี้ หากคุณไม่รู้จักคำขอนี้หรือมีคำถามเพิ่มเติม โปรด <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">ติดต่อเรา<\/a>.\n        <\/p>\n        <p>\n          ด้วยความนับถือ,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/TransferCompleted/sm-tr.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Transfer tamamlandı<\/h1>\n        <h3>Merhaba {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">Transferiniz tamamlandı.<\/p>\n\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Ödeme ID'si: {{paymentId}}<\/strong><\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>Hesaptan çekildi: {{debitedAccountName}} {{debitedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Çekilen tutar: {{debitedCurrencyCode}} {{debitedAmount}}<\/strong><\/p>\n\n        <p><span class=\"list-bullet-point\"><\/span><strong>Yatırıldı: {{creditedAccountName}} {{creditedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Yatırılan tutar: {{creditedCurrencyCode}} {{creditedAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Giriş yapın<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"\n          margin-top: 30px;\n          margin-bottom: 20px;\n        \">\n          Bu işlemi tanımıyorsanız, lütfen <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">bizimle iletişime geçin<\/a>.\n        <\/p>\n        <p>\n          Saygılarımızla,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"vn":{"name":"sm-vn.html","rel":"Templates/TransferCompleted/sm-vn.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>Chuyển khoản hoàn tất<\/h1>\n        <h3>Xin chào {{firstName}},<\/h3>\n        <p class=\"gap-after-paragraph\">Giao dịch chuyển tiền của bạn đã hoàn tất.<\/p>\n\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Mã thanh toán: {{paymentId}}<\/strong><\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>Trừ từ: {{debitedAccountName}} {{debitedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Số tiền trừ: {{debitedCurrencyCode}} {{debitedAmount}}<\/strong><\/p>\n\n        <p><span class=\"list-bullet-point\"><\/span><strong>Ghi có vào: {{creditedAccountName}} {{creditedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>Số tiền ghi có: {{creditedCurrencyCode}} {{creditedAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">Đăng nhập<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"\n          margin-top: 30px;\n          margin-bottom: 20px;\n        \">\n          Nếu bạn không nhận ra giao dịch này, vui lòng <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">liên hệ với chúng tôi<\/a>.\n        <\/p>\n        <p>\n          Trân trọng,<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"zh":{"name":"sm-zh.html","rel":"Templates/TransferCompleted/sm-zh.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n  <tbody>\n    <tr>\n      <td>\n        <h1>转账完成<\/h1>\n        <h3>您好 {{firstName}}，<\/h3>\n        <p class=\"gap-after-paragraph\">您的转账已完成。<\/p>\n\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>付款编号：{{paymentId}}<\/strong><\/p>\n        \n        <p><span class=\"list-bullet-point\"><\/span><strong>扣款来自：{{debitedAccountName}} {{debitedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>扣除金额：{{debitedCurrencyCode}} {{debitedAmount}}<\/strong><\/p>\n\n        <p><span class=\"list-bullet-point\"><\/span><strong>入账至：{{creditedAccountName}} {{creditedTradingAccountId}}<\/strong><\/p>\n        <p class=\"gap-after-paragraph\"><span class=\"list-bullet-point\"><\/span><strong>入账金额：{{creditedCurrencyCode}} {{creditedAmount}}<\/strong><\/p>\n        \n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">登录<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n        \n        <p style=\"\n          margin-top: 30px;\n          margin-bottom: 20px;\n        \">\n          如果您对此交易有任何疑问，请 <a href=\"mailto:{{paymentsEmailAddress}}\" target=\"_blank\">联系我们<\/a>。\n        <\/p>\n        <p>\n          此致，<br />\n          Scope Markets\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"}},"Templates/Welcome":{"_display":"Templates/Welcome","_key":"Templates/Welcome","ar":{"name":"sm-ar.html","rel":"Templates/Welcome/sm-ar.html","ext":".html","content":"<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\" mb=\"30px\">\n  <tbody>\n    <tr>\n      <td colspan=\"3\" style=\"height: 0\"><\/td>\n    <\/tr>\n    <tr>\n      <td style=\"width: 0\"><\/td>\n      <td style=\"\">\n        <h1 style=\"margin-bottom: 20px;\">\n          مرحباً بك في <br />Scope Markets!\n        <\/h1>\n        <p class=\"light\" style=\"margin-bottom: 30px;\">\n          أكمل التسجيل وسيتم إنشاء حساب تداول خاص بك تلقائيًا. لا انتظار، ولا عناء - فقط\n          قم بخطوتك التالية.\n        <\/p>\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">\n          أكمل التسجيل\n        <\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      <\/td>\n      <td style=\"width: 0\"><\/td>\n    <\/tr>\n    <tr>\n      <td colspan=\"3\" style=\"height: 0\"><\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n<p class=\"body1\" style=\"margin-bottom: 0px; margin-top: 40px;\">\n  استكشف الأسواق العالمية - <i>كما تشاء<\/i>\n<\/p>\n<p class=\"body4\" style=\"margin-bottom: 20px; margin-top: 10px;\">\n  استفد من عالم Scope الواسع الذي يضم أكثر من <b>40,000 أداة تداول<\/b> واستمتع بمزايا تداول\n  مؤسسي.\n<\/p>\n<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n  <tbody>\n    <tr>\n      <td style=\"width: 56px\">\n        <img\n          src=\"https://cdn.scopemarkets.cloud/mailer/2025/automated-emails/welcome-email/icon-1.png\"\n          title=\"ScopeMarkets\"\n          alt=\"ScopeMarkets\"\n          class=\"image\"\n          width=\"639\"\n        />\n      <\/td>\n      <td style=\"width: 15px\"><\/td>\n      <td valign=\"top\">\n        <p class=\"bold\" style=\"margin-bottom: 5px; margin-top: 5px;\">\n          تداول على أصول متعددة\n        <\/p>\n        <p class=\"body4\" style=\"margin-bottom: 1em; margin-top: 0px;\">\n          على عقود الفروقات في الفوركس والمعادن والمؤشرات وقطاع الطاقة والأسهم وغيرها.\n        <\/p>\n      <\/td>\n    <\/tr>\n    <tr>\n      <td style=\"width: 56px\">\n        <img\n          src=\"https://cdn.scopemarkets.cloud/mailer/2025/automated-emails/welcome-email/icon-2.png\"\n          title=\"ScopeMarkets\"\n          alt=\"ScopeMarkets\"\n          class=\"image\"\n          width=\"639\"\n        />\n      <\/td>\n      <td style=\"width: 15px\"><\/td>\n      <td valign=\"top\">\n        <p class=\"bold\" style=\"margin-bottom: 5px; margin-top: 5px;\">\n          منصة ميتا =\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">\n          กรอกข้อมูลการลงทะเบียน\n        <\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      <\/td>\n      <td style=\"width: 0\"><\/td>\n    <\/tr>\n    <tr>\n      <td colspan=\"3\" style=\"height: 0\"><\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n<p class=\"body1\" style=\"margin-bottom: 0px; margin-top: 40px;\">\n  เข้าถึงตลาดโลก - <i>ในแบบของคุณ<\/i>\n<\/p>\n<p class=\"body4\" style=\"margin-bottom: 20px; margin-top: 10px;\">\n  เข้าถึงจักรวาลอันกว้างใหญ่ของ Scope ที่มี\n  <b>ผลิตภัณฑ์เทรดกว่า 40,000 รายการ<\/b> และเพลิดเพลินกับเงื่อนไขการเทรดระดับสถาบัน\n<\/p>\n<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n  <tbody>\n    <tr>\n      <td style=\"width: 56px\">\n        <img\n          src=\"https://cdn.scopemarkets.cloud/mailer/2025/automated-emails/welcome-email/icon-1.png\"\n          title=\"ScopeMarkets\"\n          alt=\"ScopeMarkets\"\n          class=\"image\"\n          width=\"639\"\n        />\n      <\/td>\n      <td style=\"width: 15px\"><\/td>\n      <td valign=\"top\">\n        <p class=\"bold\" style=\"margin-bottom: 5px; margin-top: 5px;\">\n          เทรดหลายสินทรัพย์\n        <\/p>\n        <p class=\"body4\" style=\"margin-bottom: 1em; margin-top: 0px;\">\n          ผ่าน CFD ในฟอเร็กซ์ โลหะ ดัชนี พลังงาน หุ้น และอื่นๆ\n        <\/p>\n      <\/td>\n    <\/tr>\n    <tr>\n      <td style=\"width: 56px\">\n        <img\n          src=\"https://cdn.scopemarkets.cloud/mailer/2025/automated-emails/welcome-email/icon-2.png\"\n          title=\"ScopeMarkets\"\n          alt=\"ScopeMarkets\"\n          class=\"image\"\n          width=\"639\"\n        />\n      <\/td>\n      <td style=\"width: 15px\"><\/td>\n      <td valign=\"top\">\n        <p class=\"bold\" style=\"margin-bottom: 5px; margin-top: 5px;\">\n          แพลตฟอร์ม MetaTrader ชั้นนำของโลก\n        <\/p>\n -top: 5px;\">\n          บริการลูกค้าที่เหนือกว่า\n        <\/p>\n        <p class=\"body4\" style=\"margin-bottom: 1em; margin-top: 0px;\">\n          คุณจะได้รับการสนับสนุนจากทีมบริการลูกค้าพหุภาษาของเรา\n        <\/p>\n      <\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n  <tbody>\n    <tr>\n      <td colspan=\"3\" style=\"height: 20px\"><\/td>\n    <\/tr>\n    <tr>\n      <td style=\"width: 0\"><\/td>\n      <td style=\"\"><\/td>\n      <td style=\"width: 0\"><\/td>\n    <\/tr>\n    <tr>\n      <td colspan=\"3\" style=\"height: 20px\"><\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n<p class=\"subtitle1\">\n  พร้อมที่จะเทรดในแบบของคุณ?\n<\/p>\n<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n  <tbody>\n    <tr>\n      <td colspan=\"3\" style=\"height: 0\"><\/td>\n    <\/tr>\n    <tr>\n      <td style=\"width: 0\"><\/td>\n      <td style=\"\">\n        <!--[if mso]><v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" href=\"{{loginUrl}}\" style=\"height:60px;v-text-anchor:middle;width:300px;\" arcsize=\"30%\" stroke=\"f\" fillcolor=\"#0055ff\"><w:anchorlock/><center><![endif]-->\n        <a class=\"primary-cta\" href=\"{{loginUrl}}\" target=\"_blank\">กรอกข้อมูลการลงทะเบียน<\/a>\n        <!--[if mso]><\/center><\/v:roundrect><![endif]-->\n      <\/td>\n      <td style=\"width: 0\"><\/td>\n    <\/tr>\n    <tr>\n      <td colspan=\"3\" style=\"height: 0\"><\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"\">\n  <tbody>\n    <tr>\n      <td colspan=\"3\" style=\"height: 20px\"><\/td>\n    <\/tr>\n    <tr>\n      <td style=\"width: 0\"><\/td>\n      <td style=\"\"><\/td>\n      <td style=\"width: 0\"><\/td>\n    <\/tr>\n    <tr>\n      <td colspan=\"3\" style=\"height: 20px\"><\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>"},"tr":{"name":"sm-tr.html","rel":"Templates/Welcome/sm-tr.htm
